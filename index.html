<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Подбор камеры</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== ВСЕ СТИЛИ ИЗ ПРОТОТИПА (без изменений) ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #15171A;
    --ink-soft: #1C1F23;
    --surface: #2A2D31;
    --surface-raised: #313438;
    --border: #3A3D42;
    --border-soft: #2F3236;
    --paper: #F5F3EE;
    --paper-dim: #9A9690;
    --paper-faint: #6B6862;
    --signal: #E8470C;
    --signal-dim: #B83A0C;
    --signal-soft: rgba(232, 71, 12, 0.14);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --ease: cubic-bezier(.25,.8,.25,1);
  }

  body {
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
    line-height: 1.5;
  }

  .shell { width: 100%; max-width: 600px; }

  /* ── HEADER ── */
  .hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-mark {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .hdr-mark span { color: var(--signal); }
  .hdr-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-faint);
    letter-spacing: .02em;
  }

  /* ── APERTURE PROGRESS ── */
.aperture-wrap {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 40px;
}
.aperture-svg { flex-shrink: 0; }
.aperture-blade {
  transition: transform .5s cubic-bezier(.25,.8,.25,1);
  transform-origin: 50px 50px;
}
.aperture-track { flex: 1; }
.aperture-step-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--paper-faint, #6B6862);
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.aperture-bar {
  height: 1px;
  background: var(--border, #3A3D42);
  position: relative;
}
.aperture-bar-fill {
  position: absolute;
  top: 0; left: 0; height: 1px;
  background: var(--signal, #E8470C);
  transition: width .45s cubic-bezier(.25,.8,.25,1);
}
<div class="aperture-wrap" id="apertureWrap">
  <!-- сюда будет вставляться SVG и полоса прогресса -->
</div>
  
  /* ── QUESTION BLOCK ── */
  .q-block { animation: rise .4s var(--ease) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--signal);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .q-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    line-height: 1.22;
    letter-spacing: -.01em;
    margin-bottom: 8px;
    max-width: 480px;
  }
  .q-sub {
    font-size: 14px;
    color: var(--paper-dim);
    margin-bottom: 32px;
  }

  /* ── OPTIONS ── */
  .opts { display: flex; flex-direction: column; }

  .opt {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 4px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    transition: padding-left .25s var(--ease);
    user-select: none;
  }
  .opt:first-child { border-top: 1px solid var(--border-soft); }
  .opt:hover { padding-left: 10px; }

  .opt-index {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper-faint);
    width: 20px;
    flex-shrink: 0;
    transition: color .2s;
  }
  .opt.selected .opt-index { color: var(--signal); }

  .opt-body { flex: 1; min-width: 0; }
  .opt-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--paper);
    transition: color .2s;
  }
  .opt-hint {
    font-size: 13px;
    color: var(--paper-faint);
    margin-top: 2px;
  }

  .opt-mark {
    width: 16px; height: 16px;
    border: 1px solid var(--paper-faint);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: border-color .2s;
  }
  .opt.selected .opt-mark { border-color: var(--signal); }
  .opt.selected .opt-mark::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--signal);
  }
  .opt-mark.square { border-radius: 3px; }
  .opt-mark.square::after { border-radius: 1px; }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
  }
  .btn-text {
    background: none;
    border: none;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--paper-faint);
    cursor: pointer;
    padding: 8px 0;
    transition: color .2s;
  }
  .btn-text:hover:not(:disabled) { color: var(--paper); }
  .btn-text:disabled { opacity: .25; cursor: default; }

  .btn-shutter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--paper);
    color: var(--ink);
    border: none;
    border-radius: 2px;
    padding: 13px 26px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .btn-shutter:hover:not(:disabled) { background: #fff; transform: translateX(2px); }
  .btn-shutter:disabled { opacity: .25; cursor: default; transform: none; }
  .btn-shutter svg { transition: transform .2s; }
  .btn-shutter:hover svg { transform: translateX(3px); }

  .skip-note {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-faint);
  }

  /* ── RESULTS ── */
  .r-head { margin-bottom: 32px; }
  .r-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--signal);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .r-title {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .r-sub { font-size: 14px; color: var(--paper-dim); }

  .cam-list { display: flex; flex-direction: column; gap: 1px; }

  .cam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 20px;
    position: relative;
    transition: background .2s;
  }
  .cam-card + .cam-card { margin-top: 14px; }
  .cam-card.top { border-color: var(--signal-dim); background: var(--surface-raised); }

  /* aperture ring score indicator */
  .score-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .score-ring { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .score-ring-fill {
    fill: none;
    stroke: var(--paper-faint);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s var(--ease);
  }
  .cam-card.top .score-ring-fill { stroke: var(--signal); }
  .score-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper-dim);
  }
  .cam-card.top .score-num { color: var(--signal); }

  .cam-main { min-width: 0; }

  .cam-row1 {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .cam-name {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -.005em;
  }
  .cam-price {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--paper-dim);
    white-space: nowrap;
  }

  .cam-tagrow { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .cam-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .03em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--paper-faint);
  }
  .cam-tag.pick {
    border-color: var(--signal-dim);
    color: var(--signal);
    background: var(--signal-soft);
  }

  .cam-reasons { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .reason {
    font-size: 13px;
    color: var(--paper);
    display: flex;
    gap: 8px;
  }
  .reason::before {
    content: '—';
    color: var(--signal);
    flex-shrink: 0;
  }

  .cam-specs { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 14px; }
  .spec {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-faint);
  }

  .cam-note {
    font-size: 13px;
    color: var(--paper-dim);
    line-height: 1.55;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
    margin-bottom: 14px;
  }

  .cam-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .avito-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    background: var(--paper);
    padding: 9px 16px;
    text-decoration: none;
    border-radius: 2px;
    transition: background .2s;
  }
  .avito-link:hover { background: #fff; }

  .fb-group { display: flex; align-items: center; gap: 10px; }
  .fb-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--paper-faint);
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .fb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--paper-faint);
    width: 32px; height: 32px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .2s, color .2s;
  }
  .fb-btn:hover { border-color: var(--paper-dim); color: var(--paper); }
  .fb-btn.active.up { border-color: #4D8C5C; color: #4D8C5C; }
  .fb-btn.active.down { border-color: var(--signal); color: var(--signal); }
  .fb-btn.dimmed { opacity: .3; pointer-events: none; }

  .r-foot {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .link-btn {
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper-faint);
    letter-spacing: .02em;
    cursor: pointer;
    transition: color .2s;
  }
  .link-btn:hover { color: var(--paper); }

  .not-found { text-align: center; padding: 60px 20px; }
  .not-found .nf-mark { font-family: var(--font-display); font-size: 40px; color: var(--border); margin-bottom: 20px; }
  .not-found h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; margin-bottom: 10px; }
  .not-found p { color: var(--paper-dim); font-size: 14px; max-width: 360px; margin: 0 auto 24px; }

  @media (max-width: 480px) {
    .cam-card { grid-template-columns: 1fr; }
    .score-ring-wrap { flex-direction: row; justify-content: flex-start; }
    .q-title { font-size: 23px; }
  }
</style>
</head>

const screen = document.getElementById('screen');
const apertureWrap = document.getElementById('apertureWrap');
const hdrMeta = document.getElementById('hdrMeta');

// ============================================================
// 4. ДИАФРАГМЕННОЕ КОЛЬЦО (из прототипа)
// ============================================================
function apertureSVG(openness) {
  const blades = 6;
  const cx = 50, cy = 50, r = 38;
  let paths = '';
  for (let i = 0; i < blades; i++) {
    const angle = (360 / blades) * i;
    const scale = 1 - openness * 0.62;
    paths += `<g class="aperture-blade" style="transform: rotate(${angle}deg) scale(${scale})">
      <path d="M 50 50 L 50 4 A 46 46 0 0 1 88 26 Z" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
    </g>`;
  }
  return `<svg class="aperture-svg" width="60" height="60" viewBox="0 0 100 100">
    <circle cx="${cx}" cy="${cy}" r="${r+4}" fill="none" stroke="var(--border)" stroke-width="1"/>
    ${paths}
    <circle cx="${cx}" cy="${cy}" r="${4 + openness * 14}" fill="var(--ink)" />
  </svg>`;
}

function renderAperture(stepIdx, total) {
  const openness = stepIdx / total;
  apertureWrap.innerHTML = `
    ${apertureSVG(openness)}
    <div class="aperture-track">
      <div class="aperture-step-label">f/${(1.4 + openness * 20).toFixed(1)} · шаг ${Math.min(stepIdx+1, total)} из ${total}</div>
      <div class="aperture-bar"><div class="aperture-bar-fill" style="width:${(stepIdx/total)*100}%"></div></div>
    </div>`;
}

  document.querySelectorAll('#levelOpts .opt').forEach(el => {

// ============================================================
// 6. ОСТАЛЬНАЯ ЛОГИКА (без изменений)
// ============================================================
function initBranch() {
  const level = state.level;
  if (level === 'beginner') {
    state.questions = questionTree.beginner.slice();
    state.totalSteps = state.questions.length;
  } else if (level === 'enthusiast') {
    state.questions = questionTree.enthusiast.tt.slice(0, 4);
    state.totalSteps = 7;
  } else if (level === 'pro') {
    state.questions = questionTree.pro.slice();
    state.totalSteps = state.questions.length;
  } else if (level === 'blogger') {
    state.questions = questionTree.blogger.slice();
    state.totalSteps = state.questions.length;
  }
  renderAperture(0, state.totalSteps);
}

function render() {
  if (state.finished) { showResults(); return; }
  if (!state.level) { renderLevelSelection(); return; }
  if (!state.questions || state.questions.length === 0) {
    initBranch();
    if (state.questions.length === 0) { screen.innerHTML = '<p>Ошибка: вопросы не найдены</p>'; return; }
  }
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentStep];
  if (!q) { state.finished = true; render(); return; }

  const isMulti = q.multiple || false;
  const selected = state.answers[q.id] || (isMulti ? [] : null);

  const stepNumber = state.currentStep + 1;
  const total = state.totalSteps;

  const optionsHtml = q.options.map((opt, i) => {
    const num = String(i+1).padStart(2, '0');
    const checked = isMulti ? (selected.includes(opt.value) ? 'checked' : '') : (selected === opt.value ? 'checked' : '');
    const inputType = isMulti ? 'checkbox' : 'radio';
    const name = isMulti ? `${q.id}[]` : q.id;
    return `
      <div class="opt" data-value="${opt.value}">
        <span class="opt-index">${num}</span>
        <div class="opt-body">
          <div class="opt-title">${opt.label}</div>
          ${opt.hint ? `<div class="opt-hint">${opt.hint}</div>` : ''}
        </div>
        <input type="${inputType}" name="${name}" value="${opt.value}" ${checked} style="display:none;" />
        <div class="opt-mark ${isMulti ? 'square' : ''}"></div>
      </div>
    `;
  }).join('');

  const eyebrow = `ПАРАМЕТР ${String(stepNumber).padStart(2, '0')}`;

  screen.innerHTML = `
    <div class="q-block">
      <div class="q-eyebrow">${eyebrow}</div>
      <div class="q-title">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="opts" data-qid="${q.id}" data-multiple="${isMulti}">${optionsHtml}</div>
      <div class="actions">
        <button class="btn-text" id="prevBtn" ${state.currentStep === 0 ? 'disabled' : ''}>← назад</button>
        <span></span>
        <button class="btn-shutter" id="nextBtn" disabled>${state.currentStep === state.totalSteps - 1 ? 'Показать камеры' : 'Далее'}</button>
      </div>
    </div>
  `;

  // Обработчики выбора
  const inputs = screen.querySelectorAll('.opt input');
  inputs.forEach(inp => {
    inp.addEventListener('change', (e) => {
      const qid = e.target.closest('.opts').dataset.qid;
      const multiple = e.target.closest('.opts').dataset.multiple === 'true';
      if (multiple) {
        const checked = screen.querySelectorAll(`.opts input[name="${qid}[]"]:checked`);
        state.answers[qid] = Array.from(checked).map(c => c.value);
      } else {
        if (e.target.checked) state.answers[qid] = e.target.value;
      }
      updateNextButtonState();
      if (qid === 'e1') {
        const val = state.answers['e1'];
        if (val === 'tt') state.questions = questionTree.enthusiast.tt.slice();
        else if (val === 'creative') state.questions = questionTree.enthusiast.creative.slice();
        state.totalSteps = state.questions.length;
        state.currentStep = 1;
        render();
        return;
      }
    });
  });

  // Клик по всей строке
  screen.querySelectorAll('.opt').forEach(el => {
    const inp = el.querySelector('input');
    el.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (inp) {
        if (inp.type === 'checkbox') {
          inp.checked = !inp.checked;
        } else {
          const name = inp.name;
          screen.querySelectorAll(`input[name="${name}"]`).forEach(r => r.checked = false);
          inp.checked = true;
        }
        inp.dispatchEvent(new Event('change'));
      }
    });
    if (inp && inp.checked) el.classList.add('selected');
    else el.classList.remove('selected');
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (state.level === 'enthusiast' && state.currentStep === 1) {
      state.level = null;
      state.currentStep = 0;
      state.answers = {};
      state.questions = [];
      state.totalSteps = 0;
      render();
      return;
    }
    if (state.currentStep > 0) { state.currentStep--; render(); }
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    const qid = state.questions[state.currentStep].id;
    const answer = state.answers[qid];
    if (!answer || (Array.isArray(answer) && answer.length === 0)) {
      alert('Пожалуйста, выберите вариант ответа');
      return;
    }
    if (state.currentStep === state.totalSteps - 1) { state.finished = true; render(); return; }
    state.currentStep++;
    render();
  });

  updateNextButtonState();
  renderAperture(state.currentStep + 1, state.totalSteps);
  hdrMeta.textContent = `id · ${String(stepNumber).padStart(2,'0')}/${total}`;
}

function updateNextButtonState() {
  const q = state.questions[state.currentStep];
  if (!q) return;
  const answer = state.answers[q.id];
  const hasAnswer = answer && (Array.isArray(answer) ? answer.length > 0 : true);
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.disabled = !hasAnswer;
}

}

function getWeightsEnthusiast() {
  const path = state.answers['e1'];
  const base = {
    priceRange: (price) => {
      const budget = state.answers['e2'];
      if (budget === 'budget_1') return price <= 30000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 60000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 100000 ? 1 : 0;

      if (budget === 'budget_5') return price > 200000 ? 1 : 0;
      return 0.5;
    },
  };
  if (path === 'tt') {

        const need = state.answers['e7_tt'];
        return need === 'af_critical' ? (cam.eyeAutofocus === true ? 1 : 0) : 0.5;
      }
    };

      },
      ergo: (cam) => {
        const need = state.answers['e7_creative'];
        return need === 'ergo_important' ? (cam.weight < 600 ? 1 : 0) : 0.5;
      }
    };
  }
}

function getWeightsPro() {
  return {
    sensor: (cam) => {
      const need = state.answers['p1'];
      if (need === 'crop') return cam.crop ? 1 : 0;
      if (need === 'fullframe') return cam.fullFrame ? 1 : 0;
      if (need === 'medium') return cam.mediumFormat ? 1 : 0;
      return 0.5;
    },
    priceRange: (price) => {
      const budget = state.answers['p2'];
      if (budget === 'budget_1') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 200000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 400000 ? 1 : 0;
      if (budget === 'budget_4') return price > 400000 ? 1 : 0;
      return 0.5;
    },
    weight: (cam) => {
      const need = state.answers['p3'];
      if (need === 'weight_critical') return cam.weight < 700 ? 1 : 0;
      if (need === 'weight_moderate') return cam.weight < 1000 ? 1 : 0;
      return 0.5;
    },
    eyeAf: (cam) => {
      const need = state.answers['p4'];
      if (need === 'yes') return cam.eyeAutofocus === true ? 1 : 0;
      if (need === 'not_use') return 0.5;
      return 0;
    },
    log: (cam) => {
      const need = state.answers['p5'];
      if (need === 'yes') return cam.logProfile ? 1 : 0;
      if (need === 'no_video') return 0.5;
      return 0;
    },
    bitDepth: (cam) => {
      const need = state.answers['p6'];
      if (need === '12bit') return cam.bitDepth >= 12 ? 1 : 0;
      if (need === '14bit') return cam.bitDepth >= 14 ? 1 : 0;
      return 0.5;
    },
    replaceOrSecond: (cam) => {
      const choice = state.answers['p7'];
      const currentSystem = state.answers['p8'];
      const lensPark = state.answers['p9'];
      let systemBonus = 0;
      if (choice === 'second') {
        if (cam.brand === currentSystem) systemBonus = 0.3;
      } else {
        if (cam.brand !== currentSystem) {
          systemBonus = 0.2;
          if (cam.brand === 'Sony') systemBonus += 0.1;
        }
      }
      let lensBonus = 0;
      if (lensPark === 'third_party' && cam.brand === 'Sony') lensBonus = 0.3;
      else if (lensPark === 'mixed' && cam.brand === 'Sony') lensBonus = 0.15;
      const extras = state.answers['p10'] || [];
      let extraBonus = 0;
      if (extras.includes('two_slots') && cam.cardSlots >= 2) extraBonus += 0.1;
      if (extras.includes('eye_af_video') && cam.eyeAutofocus === true) extraBonus += 0.1;
      if (extras.includes('log_video') && cam.logProfile) extraBonus += 0.1;
      if (extras.includes('weather') && cam.weatherSealing) extraBonus += 0.1;
      if (extras.includes('ibis') && cam.imageStabilization) extraBonus += 0.1;
      return systemBonus + lensBonus + extraBonus;
    }
  };
}

function getWeightsBlogger() {
  return {
    priceRange: (price) => {
      const budget = state.answers['bl1'];
      if (budget === 'budget_1') return price <= 30000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 60000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_4') return price <= 200000 ? 1 : 0;
      if (budget === 'budget_5') return price > 200000 ? 1 : 0;
      return 0.5;
    },
    platform: (cam) => {
      const platform = state.answers['bl2'];
      if (platform === 'youtube') {
        let s=0;
        if (cam.video && cam.video.includes('4K')) s+=0.5;
        if (cam.imageStabilization) s+=0.3;
        if (cam.microphoneInput) s+=0.2;
        return s;
      } else if (platform === 'shorts') {
        let s=0;
        if (cam.compact || cam.mirrorless) s+=0.4;
        if (cam.rotatingScreen) s+=0.3;
        if (cam.autofocus) s+=0.3;
        return s;
      } else if (platform === 'streams') {
        let s=0;
        if (cam.video) s+=0.3;
        if (cam.microphoneInput) s+=0.3;
        if (cam.imageStabilization) s+=0.2;
        if (cam.autofocus) s+=0.2;
        return s;
      }
      return 0.5;
    },
    ibis: (cam) => {
      const need = state.answers['bl3'];
      if (need === 'ibis_critical') return cam.imageStabilization ? 1 : 0;
      if (need === 'gimbal') return 0.5;
      return 0.5;
    },
    mic: (cam) => {
      const need = state.answers['bl4'];
      return need === 'yes' ? (cam.microphoneInput ? 1 : 0) : 0.5;
    },
    flipScreen: (cam) => {
      const need = state.answers['bl5'];
      if (need === 'critical') return cam.rotatingScreen ? 1 : 0;
      if (need === 'desirable') return cam.rotatingScreen ? 0.5 : 0;
      return 0.5;
    },
    afVideo: (cam) => {
      const need = state.answers['bl6'];
      return need === 'critical' ? (cam.autofocus ? 1 : 0) : 0.5;
    },
    menuComplexity: (cam) => {
      const need = state.answers['bl7'];
      return need === 'simple' ? (cam.menuComplexity === 'simple' ? 1 : 0) : 0.5;
    },
    weightCompact: (cam) => {
      const need = state.answers['bl8'];
      if (need === 'critical') return (cam.compact || cam.mirrorless) && cam.weight < 600 ? 1 : 0;
      if (need === 'moderate') return cam.weight < 800 ? 1 : 0;
      return 0.5;
    }
  };
}

// ============================================================
// 8. РАСЧЁТ РЕЗУЛЬТАТОВ (с жёстким бюджетным фильтром)
// ============================================================
function computeScores() {
  const level = state.level;
  if (!level || !cameras.length) return [];

  // 1. Жёсткий бюджетный фильтр
  const budgetLimit = getBudgetLimit(level, state.answers);
  const filteredCameras = cameras.filter(cam => cam.price <= budgetLimit);
  if (!filteredCameras.length) return [];

  // 2. Скоринг
  let weightsFn;
  if (level === 'beginner') weightsFn = getWeightsBeginner;
  else if (level === 'enthusiast') weightsFn = getWeightsEnthusiast;
  else if (level === 'pro') weightsFn = getWeightsPro;
  else if (level === 'blogger') weightsFn = getWeightsBlogger;
  else return [];

  const weights = weightsFn();
  const keys = Object.keys(weights).filter(k => typeof weights[k] === 'function');
  const count = keys.length || 1;

  const scored = filteredCameras.map(cam => {
    let sum = 0;
    keys.forEach(key => { sum += weights[key](cam); });
    const normalized = Math.min(1, sum / count);
    return { ...cam, score: normalized };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 6);
}

function ringSVG(score, isTop) {
  const r = 24, circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - score / 100);
  return `<svg class="score-ring" width="64" height="64" viewBox="0 0 64 64">
    <circle class="score-ring-bg" cx="32" cy="32" r="${r}"/>
    <circle class="score-ring-fill" cx="32" cy="32" r="${r}"
      stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
      data-final-offset="${offset}"/>
  </svg>`;
}

// ============================================================
// 9. ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ (из прототипа)
// ============================================================
function showResults() {
  hdrMeta.textContent = 'результат';
  renderAperture(1, 1);

  const results = computeScores();
  if (!results.length) {
    screen.innerHTML = `
      <div class="not-found">
        <div class="nf-mark">∅</div>
        <h3>Ничего не нашли</h3>
        <p>По вашим критериям не нашлось подходящих камер. Попробуйте изменить бюджет или убрать ограничения по системе.</p>
        <button class="btn-shutter" id="btnReset">Начать заново</button>
      </div>`;
    document.getElementById('btnReset').addEventListener('click', reset);
    return;
  }

  const lvlMap = { beginner: 'новичка', enthusiast: 'любителя', pro: 'профессионала', blogger: 'блогера' };
  const goalMap = { photo:'фото', video:'видео', blog:'блог', travel:'путешествия', studio:'студия', sport:'спорт' };
  const a = state.answers;
  const summary = [
    a.level ? lvlMap[a.level] : null,
    a.budget ? `бюджет до $${a.budget}` : null,
    (a.goals && a.goals.length) ? a.goals.map(g => goalMap[g]).filter(Boolean).join(', ') : null,
  ].filter(Boolean).join(' · ');

  const cardsHtml = results.map((cam, i) => {
    const isTop = i === 0;
    const pct = Math.round(cam.score * 100);
    const reasonsHtml = cam.reasons ? cam.reasons.map(r => `<div class="reason">${r}</div>`).join('') : '';
    const specsHtml = (cam.specs || cam.checkpoints || []).map(s => `<span class="spec">${s}</span>`).join('');
    const avitoUrl = `https://www.avito.ru/all?q=${encodeURIComponent(cam.avitoQuery || cam.model)}`;
    const voted = state.voted[cam.id];
    const tag = cam.tag || '';

    return `
      <div class="cam-card${isTop ? ' top' : ''}">
        <div class="score-ring-wrap">
          ${ringSVG(pct, isTop)}
          <span class="score-num">${pct}%</span>
        </div>
        <div class="cam-main">
          <div class="cam-row1">
            <span class="cam-name">${cam.brand} ${cam.model}</span>
            <span class="cam-price">${cam.price}</span>
          </div>
          <div class="cam-tagrow">
            ${tag ? `<span class="cam-tag${isTop ? ' pick' : ''}">${tag}</span>` : ''}
            ${isTop ? '<span class="cam-tag pick">рекомендуем</span>' : ''}
          </div>
          ${reasonsHtml ? `<div class="cam-reasons">${reasonsHtml}</div>` : ''}
          <div class="cam-specs">${specsHtml}</div>
          <div class="cam-note">${cam.note || ''}</div>
          <div class="cam-foot">
            <a class="avito-link" href="${avitoUrl}" target="_blank" rel="noopener">найти на авито</a>
            <div class="fb-group">
              <span class="fb-label">подходит?</span>
              <button class="fb-btn up${voted === 1 ? ' active' : ''}${voted !== undefined ? ' dimmed' : ''}" data-id="${cam.id}" data-vote="1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M7 11v10H4a1 1 0 01-1-1v-8a1 1 0 011-1h3zm0 0l5-9a2.5 2.5 0 015 1v4h5.5a2 2 0 011.94 2.49l-1.5 6A2 2 0 0118.04 21H9a2 2 0 01-2-2v-8z" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
              <button class="fb-btn down${voted === -1 ? ' active' : ''}${voted !== undefined ? ' dimmed' : ''}" data-id="${cam.id}" data-vote="-1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="transform:rotate(180deg)"><path d="M7 11v10H4a1 1 0 01-1-1v-8a1 1 0 011-1h3zm0 0l5-9a2.5 2.5 0 015 1v4h5.5a2 2 0 011.94 2.49l-1.5 6A2 2 0 0118.04 21H9a2 2 0 01-2-2v-8z" stroke="currentColor" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  screen.innerHTML = `
    <div class="r-head">
      <div class="r-eyebrow">выдержка зафиксирована</div>
      <div class="r-title">Топ-4 камеры для вас</div>
      <div class="r-sub">${summary}</div>
    </div>
    <div class="cam-list">${cardsHtml}</div>
    <div class="r-foot">
      <button class="link-btn" id="btnBack">изменить ответы</button>
      <button class="link-btn" id="btnReset">начать заново</button>
    </div>
  `;

  requestAnimationFrame(() => {
    document.querySelectorAll('.score-ring-fill').forEach(el => {
      el.style.strokeDashoffset = el.dataset.finalOffset;
    });
  });

  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('btnBack').addEventListener('click', () => {
    state.finished = false;
    state.currentStep = state.totalSteps - 1;
    render();
  });

  screen.querySelectorAll('.fb-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const vote = Number(btn.dataset.vote);
      if (state.voted[id] !== undefined) return;
      state.voted[id] = vote;
      saveFeedback(id, vote, state.answers);
      renderResults();
    });
  });
}

function saveFeedback(cameraId, vote, answers) {
  try {
    const key = 'cam_feedback';
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push({ cameraId, vote, answers: { level: answers.level, budget: answers.budget, goals: answers.goals }, date: new Date().toISOString() });
    localStorage.setItem(key, JSON.stringify(existing));
  } catch(e) {}
}

function reset() {
  state = { level: null, path: null, answers: {}, currentStep: 0, totalSteps: 0, questions: [], finished: false, voted: {} };
  render();
}

// ============================================================
// 10. ЗАПУСК
// ============================================================
loadCameras().then(() => { render(); });
</script>
