<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Подбор камеры</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── ПЕРЕМЕННЫЕ ───────────────────────────────────────────── */
:root {
  --ink: #15171A;
  --ink-soft: #1C1F23;
  --surface: #2A2D31;
  --surface-raised: #313438;
  --border: #3A3D42;
  --border-soft: #2F3236;
  --paper: #F5F3EE;
  --paper-dim: #9A9690;
  --paper-faint: #6B6862;
  --signal: #E8470C;
  --signal-dim: #B83A0C;
  --signal-soft: rgba(232, 71, 12, 0.14);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(.25,.8,.25,1);
}

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 20px 60px;
  line-height: 1.5;
  transition: background .3s, color .3s;
}
.shell { width: 100%; max-width: 600px; }

/* ─── HEADER ────────────────────────────────────────────────── */
.hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 36px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.hdr-mark {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -.01em;
}
.hdr-mark span { color: var(--signal); }
.hdr-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-faint);
  letter-spacing: .02em;
}

/* ─── APERTURE PROGRESS ───────────────────────────────────── */
.aperture-wrap {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 40px;
}
.aperture-svg { flex-shrink: 0; }
.aperture-blade {
  transition: transform .5s var(--ease);
  transform-origin: 50px 50px;
}
.aperture-track { flex: 1; }
.aperture-step-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-faint);
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.aperture-bar {
  height: 1px;
  background: var(--border);
  position: relative;
}
.aperture-bar-fill {
  position: absolute;
  top: 0; left: 0; height: 1px;
  background: var(--signal);
  transition: width .45s var(--ease);
}

/* ─── QUESTION BLOCK ───────────────────────────────────────── */
.q-block { animation: rise .4s var(--ease) both; }
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--signal);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.q-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  line-height: 1.22;
  letter-spacing: -.01em;
  margin-bottom: 8px;
  max-width: 480px;
}
.q-sub {
  font-size: 14px;
  color: var(--paper-dim);
  margin-bottom: 32px;
}

/* ─── OPTIONS ──────────────────────────────────────────────── */
.opts { display: flex; flex-direction: column; }
.opt {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 4px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  transition: padding-left .25s var(--ease);
  user-select: none;
}
.opt:first-child { border-top: 1px solid var(--border-soft); }
.opt:hover { padding-left: 10px; }

.opt-index {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--paper-faint);
  width: 20px;
  flex-shrink: 0;
  transition: color .2s;
}
.opt.selected .opt-index { color: var(--signal); }

.opt-body { flex: 1; min-width: 0; }
.opt-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--paper);
  transition: color .2s;
}
.opt-hint {
  font-size: 13px;
  color: var(--paper-faint);
  margin-top: 2px;
}

.opt-mark {
  width: 16px; height: 16px;
  border: 1px solid var(--paper-faint);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  transition: border-color .2s;
}
.opt.selected .opt-mark { border-color: var(--signal); }
.opt.selected .opt-mark::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--signal);
}
.opt-mark.square { border-radius: 3px; }
.opt-mark.square::after { border-radius: 1px; }

/* ─── ACTIONS ──────────────────────────────────────────────── */
.actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 36px;
}
.btn-text {
  background: none;
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--paper-faint);
  cursor: pointer;
  padding: 8px 0;
  transition: color .2s;
}
.btn-text:hover:not(:disabled) { color: var(--paper); }
.btn-text:disabled { opacity: .25; cursor: default; }

.btn-shutter {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--paper);
  color: var(--ink);
  border: none;
  border-radius: 2px;
  padding: 13px 26px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-shutter:hover:not(:disabled) { background: #fff; transform: translateX(2px); }
.btn-shutter:disabled { opacity: .25; cursor: default; transform: none; }
.btn-shutter svg { transition: transform .2s; }
.btn-shutter:hover svg { transform: translateX(3px); }

.skip-note {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-faint);
}

/* ─── RESULTS ──────────────────────────────────────────────── */
.r-head { margin-bottom: 32px; }
.r-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--signal);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.r-title {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 500;
  margin-bottom: 10px;
}
.r-sub { font-size: 14px; color: var(--paper-dim); }

.cam-list { display: flex; flex-direction: column; gap: 1px; }

.cam-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 24px;
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 20px;
  position: relative;
  transition: background .2s;
}
.cam-card + .cam-card { margin-top: 14px; }
.cam-card.top { border-color: var(--signal-dim); background: var(--surface-raised); }

.score-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.score-ring { transform: rotate(-90deg); }
.score-ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
.score-ring-fill {
  fill: none;
  stroke: var(--paper-faint);
  stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s var(--ease);
}
.cam-card.top .score-ring-fill { stroke: var(--signal); }
.score-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--paper-dim);
}
.cam-card.top .score-num { color: var(--signal); }

.cam-main { min-width: 0; }

.cam-row1 {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}
.cam-name {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -.005em;
}
.cam-price {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--paper-dim);
  white-space: nowrap;
}

.cam-tagrow { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.cam-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .03em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid var(--border);
  color: var(--paper-faint);
}
.cam-tag.pick {
  border-color: var(--signal-dim);
  color: var(--signal);
  background: var(--signal-soft);
}

.cam-reasons { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.reason {
  font-size: 13px;
  color: var(--paper);
  display: flex;
  gap: 8px;
}
.reason::before {
  content: '—';
  color: var(--signal);
  flex-shrink: 0;
}

.cam-specs { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 14px; }
.spec {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--paper-faint);
}

.cam-note {
  font-size: 13px;
  color: var(--paper-dim);
  line-height: 1.55;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
  margin-bottom: 14px;
}

.cam-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.avito-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  background: var(--paper);
  padding: 9px 16px;
  text-decoration: none;
  border-radius: 2px;
  transition: background .2s;
}
.avito-link:hover { background: #fff; }

.fb-group { display: flex; align-items: center; gap: 10px; }
.fb-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--paper-faint);
  text-transform: uppercase;
  letter-spacing: .03em;
}
.fb-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--paper-faint);
  width: 32px; height: 32px;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .2s, color .2s;
}
.fb-btn:hover { border-color: var(--paper-dim); color: var(--paper); }
.fb-btn.active.up { border-color: #4D8C5C; color: #4D8C5C; }
.fb-btn.active.down { border-color: var(--signal); color: var(--signal); }
.fb-btn.dimmed { opacity: .3; pointer-events: none; }

.r-foot {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.link-btn {
  background: none;
  border: none;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--paper-faint);
  letter-spacing: .02em;
  cursor: pointer;
  transition: color .2s;
}
.link-btn:hover { color: var(--paper); }

.not-found { text-align: center; padding: 60px 20px; }
.not-found .nf-mark { font-family: var(--font-display); font-size: 40px; color: var(--border); margin-bottom: 20px; }
.not-found h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; margin-bottom: 10px; }
.not-found p { color: var(--paper-dim); font-size: 14px; max-width: 360px; margin: 0 auto 24px; }

.loading { text-align: center; padding: 3rem 1rem; font-size: 18px; color: var(--paper-faint); }

@media (max-width: 480px) {
  .cam-card { grid-template-columns: 1fr; }
  .score-ring-wrap { flex-direction: row; justify-content: flex-start; }
  .q-title { font-size: 23px; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-mark">подбор<span>·</span>камеры</div>
    <div class="hdr-meta" id="hdrMeta"></div>
  </div>

  <div class="aperture-wrap" id="apertureWrap"></div>

  <div id="screen"><div class="loading">⏳ Загрузка базы камер...</div></div>
</div>

<script>
(function() {
  "use strict";

  // ─── КОНСТАНТЫ (без эмодзи) ───────────────────────────────
  const GENRE_LABELS = {
    portrait: 'Портрет', landscape: 'Пейзаж', street: 'Стрит',
    reportage: 'Репортаж', wedding: 'Свадьбы', family: 'Семьи',
    nude: 'Ню', commercial: 'Реклама', architecture: 'Архитектура',
    vlog: 'Влог', documentary: 'Документалистика'
  };
  const GOAL_LABELS = {
    photo: 'фотографии', video: 'видеосъёмке', blog: 'блогингу',
    travel: 'путешествиям', studio: 'студийной работе', sport: 'спортивной съёмке'
  };
  const LEVEL_LABELS = { beginner: 'новичка', enthusiast: 'любителя', pro: 'профессионала', blogger: 'блогера' };
  const BUDGET_LABELS = {
    low: 'ограниченном бюджете', mid: 'среднем бюджете', high: 'хорошем бюджете',
    'very-high': 'высоком бюджете', premium: 'премиальном бюджете'
  };
  const BUDGET_RANGES = ['low', 'mid', 'high', 'very-high', 'premium'];

  // ─── ШАГИ ОПРОСНИКА (без иконок) ──────────────────────────
  const STEP_DEFS = [
    { id: 'level', label: 'Шаг 1 из ?', title: 'Как ты себя оцениваешь?', type: 'single', opts: [
        { val: 'beginner', title: 'Новичок' },
        { val: 'enthusiast', title: 'Любитель' },
        { val: 'pro', title: 'Профи' },
        { val: 'blogger', title: 'Блогер' }
      ] },
    { id: 'firstCamera', label: 'Шаг 2 из ?', title: 'Это твоя первая камера?', type: 'single', opts: [
        { val: 'yes', title: 'Да, первая' },
        { val: 'no', title: 'Нет, уже была' }
      ], visibility: (s) => s.level !== 'pro' },
    { id: 'proIntent', label: 'Шаг 2 из ?', title: 'Что ты ищешь?', type: 'single', visibility: (s) => s.level === 'pro', opts: [
        { val: 'replace', title: 'Заменяю систему', sub: 'Хочу попробовать другой бренд' },
        { val: 'second', title: 'Вторую камеру', sub: 'Можно той же системы, можно другой' }
      ] },
    { id: 'system', label: 'Шаг 3 из ?', title: 'Твоя текущая система?', type: 'single', opts: [
        { val: 'canon', title: 'Canon' },
        { val: 'nikon', title: 'Nikon' },
        { val: 'sony', title: 'Sony' },
        { val: 'fujifilm', title: 'Fujifilm' },
        { val: 'panasonic', title: 'Panasonic' },
        { val: 'hasselblad', title: 'Hasselblad' },
        { val: 'leica', title: 'Leica' },
        { val: 'other', title: 'Другая' }
      ], visibility: (s) => {
        if (s.level === 'pro') return !!s.proIntent;
        return s.firstCamera === 'no';
      } },
    { id: 'goals', label: 'Шаг 4 из ?', title: 'Для каких целей? (выберите несколько)', type: 'multi', opts: [
        { val: 'photo', title: 'Фото' },
        { val: 'video', title: 'Видео' },
        { val: 'blog', title: 'Блог' },
        { val: 'travel', title: 'Путешествия' },
        { val: 'studio', title: 'Студия' },
        { val: 'sport', title: 'Спорт' }
      ] },
    { id: 'genres', label: 'Шаг 5 из ?', title: 'Какие жанры? (выберите несколько)', type: 'multi', opts: [
        { val: 'portrait', title: 'Портрет' },
        { val: 'landscape', title: 'Пейзаж' },
        { val: 'street', title: 'Стрит' },
        { val: 'reportage', title: 'Репортаж' },
        { val: 'wedding', title: 'Свадьбы' },
        { val: 'family', title: 'Семьи' },
        { val: 'nude', title: 'Ню' },
        { val: 'commercial', title: 'Реклама' },
        { val: 'architecture', title: 'Архитектура' }
      ] },
    { id: 'weight', label: 'Шаг 6 из ?', title: 'Насколько критичен вес?', type: 'single', opts: [
        { val: 'critical', title: 'Очень критичен' },
        { val: 'moderate', title: 'Умеренно' },
        { val: 'not-critical', title: 'Не критичен' }
      ] },
    { id: 'budget', label: 'Шаг 7 из ?', title: 'Бюджет', type: 'single', opts: [
        { val: 'low', title: 'До $400' },
        { val: 'mid', title: '$400–1000' },
        { val: 'high', title: '$1000–2000' },
        { val: 'very-high', title: '$2000–3000' },
        { val: 'premium', title: '$3000+' }
      ] },
    { id: 'experience', label: 'Шаг 8 из ?', title: 'Какой у тебя опыт съёмки?', type: 'single', visibility: (s) => s.level === 'beginner', opts: [
        { val: 'none', title: 'Совсем нет' },
        { val: 'some', title: 'Немного' },
        { val: 'experienced', title: 'Есть опыт' }
      ] },
    { id: 'lenses', label: 'Шаг 9 из ?', title: 'Какие объективы тебе нужны?', type: 'single', visibility: (s) => s.level === 'pro', opts: [
        { val: 'kit', title: 'Кит' },
        { val: 'prime', title: 'Фиксы' },
        { val: 'zoom', title: 'Зумы' }
      ] },
    { id: 'additional1', label: 'Шаг 10 из ?', title: '', type: 'single', visibility: (s) => s.level !== 'beginner', opts: [] },
    { id: 'additional2', label: 'Шаг 11 из ?', title: '', type: 'single', visibility: (s) => s.level !== 'beginner', opts: [] },
    { id: 'additional3', label: 'Шаг 12 из ?', title: 'Съёмка в сложных условиях?', type: 'single', visibility: (s) => s.level !== 'beginner', opts: [
        { val: 'yes', title: 'Да' },
        { val: 'no', title: 'Нет' }
      ] }
  ];

  // ─── СОСТОЯНИЕ ─────────────────────────────────────────────
  const state = {
    level: null, firstCamera: null, proIntent: null, system: null,
    goals: [], genres: [], weight: null, budget: null,
    experience: null, lenses: null, additional1: null, additional2: null, additional3: null
  };
  let currentStepIdx = 0;
  let allCameras = [];

  // ─── ЗАГРУЗКА БАЗЫ ──────────────────────────────────────────
  async function loadCameras() {
    try {
      const url = 'https://raw.githubusercontent.com/alexeynovopashin-lab/CameraChange/main/cameras.json';
      const response = await fetch(url);
      if (!response.ok) throw new Error('Ошибка загрузки JSON');
      const data = await response.json();
      allCameras = data.cameras || [];
      renderStep();
    } catch (e) {
      console.error(e);
      document.getElementById('screen').innerHTML = `
        <div class="not-found">
          <div class="nf-mark">⚠️</div>
          <h3>Не удалось загрузить базу камер</h3>
          <p>Проверьте интернет или обновите страницу.</p>
          <button class="btn-shutter" onclick="location.reload()">Обновить</button>
        </div>
      `;
    }
  }

  // ─── ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ──────────────────────────────
  function getVisibleSteps() {
    return STEP_DEFS.filter(st => st.visibility ? st.visibility(state) : true);
  }

  function getStepLabel(stepId) {
    const lvl = state.level;
    const goals = state.goals || [];
    const isVideo = goals.includes('video') || goals.includes('blog');
    if (stepId === 'additional1') {
      if (lvl === 'beginner') return 'Хочешь ли ты редактировать фото на компьютере?';
      if (lvl === 'pro') return 'Предпочитаете снимать в RAW?';
      return isVideo ? 'Планируешь снимать в Log?' : 'Есть ли опыт работы с RAW?';
    }
    if (stepId === 'additional2') {
      if (lvl === 'beginner') return 'Будешь ли снимать видео для YouTube/TikTok?';
      if (lvl === 'pro') return 'Хотите получить вкусный цвет сразу в JPG?';
      return isVideo ? 'Нужно ли тебе 4K?' : 'Планируешь печатать снимки?';
    }
    const def = STEP_DEFS.find(s => s.id === stepId);
    return def ? def.title : '';
  }

  function getDynamicOpts(stepId) {
    if (stepId === 'additional1' || stepId === 'additional2') {
      return [
        { val: 'yes', title: 'Да' },
        { val: 'no', title: 'Нет' }
      ];
    }
    const def = STEP_DEFS.find(s => s.id === stepId);
    return def ? def.opts : [];
  }

  function isStepComplete(stepId) {
    const val = state[stepId];
    if (Array.isArray(val)) return val.length > 0;
    return !!val;
  }

  // ─── ДОПУСТИМЫЕ УРОВНИ БЮДЖЕТА ──────────────────────────────
  function getAllowedBudgetLevels(userBudget) {
    const levels = {
      'low': ['low', 'mid', 'high', 'very-high', 'premium'],
      'mid': ['mid', 'high', 'very-high', 'premium'],
      'high': ['high', 'very-high', 'premium'],
      'very-high': ['very-high', 'premium'],
      'premium': ['premium']
    };
    return levels[userBudget] || ['low', 'mid', 'high', 'very-high', 'premium'];
  }

  // ─── СКОРИНГ ─────────────────────────────────────────────────
  function getBudgetScore(camBudgetRanges, userBudget) {
    if (!userBudget) return 5;
    const idx = BUDGET_RANGES.indexOf(userBudget);
    if (idx === -1) return 0;
    let best = 0;
    for (const b of camBudgetRanges) {
      const bi = BUDGET_RANGES.indexOf(b);
      if (bi === -1) continue;
      const diff = Math.abs(bi - idx);
      if (diff === 0) best = Math.max(best, 10);
      else if (diff === 1) best = Math.max(best, 7);
      else if (diff === 2) best = Math.max(best, 4);
      else best = Math.max(best, 1);
    }
    return best;
  }

  function getMatchScore(camItems, userItems) {
    if (!userItems || userItems.length === 0) return 5;
    if (!camItems || camItems.length === 0) return 0;
    const matches = camItems.filter(item => userItems.includes(item)).length;
    const total = userItems.length;
    return (matches / total) * 10;
  }

  function getWeightScore(camWeight, userWeight) {
    if (!userWeight) return 5;
    if (userWeight === 'critical') {
      if (camWeight === 'critical') return 10;
      if (camWeight === 'moderate') return 5;
      return 0;
    }
    if (userWeight === 'moderate') {
      if (camWeight === 'moderate' || camWeight === 'critical') return 8;
      return 4;
    }
    return 10;
  }

  function getSystemScore(camSystem, userSystem, proIntent, level) {
    if (!userSystem || userSystem === 'other') return 5;
    if (camSystem === userSystem) {
      if (level === 'pro' && proIntent === 'replace') return 0;
      return 10;
    } else {
      return 5;
    }
  }

  function getLevelScore(cam, level) {
    if (level === 'beginner') {
      let score = 5;
      if (cam.interchangeable === false) score += 3;
      if (cam.sensor && cam.sensor.includes('APS-C')) score += 2;
      if (cam.badge && cam.badge.includes('bu')) score += 1;
      if (cam.sensor && cam.sensor.includes('Full frame')) score -= 2;
      return Math.min(10, Math.max(0, score));
    }
    if (level === 'pro') {
      let score = 5;
      if (cam.dualSlot) score += 3;
      if (cam.sensor && (cam.sensor.includes('Full frame') || cam.sensor.includes('Средний формат'))) score += 3;
      if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
      if (cam.video && cam.video.includes('8K')) score += 2;
      if (cam.af && cam.af.includes('AI')) score += 2;
      if (cam.interchangeable) score += 1;
      return Math.min(10, Math.max(0, score));
    }
    if (level === 'blogger') {
      let score = 5;
      if (cam.goals && (cam.goals.includes('video') || cam.goals.includes('blog'))) score += 3;
      if (cam.weight === 'critical') score += 2;
      if (cam.interchangeable === false) score += 2;
      if (cam.video && cam.video.includes('4K')) score += 2;
      return Math.min(10, Math.max(0, score));
    }
    let score = 5;
    if (cam.goals && cam.goals.includes('photo') && cam.goals.includes('video')) score += 2;
    if (cam.sensor && cam.sensor.includes('APS-C')) score += 1;
    if (cam.interchangeable) score += 1;
    if (cam.dualSlot) score += 1;
    return Math.min(10, Math.max(0, score));
  }

  function getExtrasScore(cam, state) {
    let score = 5;
    const { additional1, additional2, additional3, goals } = state;
    const isVideoUser = goals && (goals.includes('video') || goals.includes('blog'));

    if (additional1 === 'yes') {
      if (cam.sensor && (cam.sensor.includes('Full frame') || cam.sensor.includes('Средний формат'))) score += 2;
      if (cam.sensor && cam.sensor.includes('X-Trans')) score += 1;
      if (cam.video && cam.video.includes('RAW')) score += 2;
    }
    if (additional1 === 'no') {
      if (cam.badge && cam.badge.includes('new')) score += 1;
      if (cam.sensor && cam.sensor.includes('APS-C')) score += 1;
      if (cam.interchangeable === false) score += 1;
    }

    if (additional2 === 'yes') {
      if (isVideoUser && cam.goals && (cam.goals.includes('video') || cam.goals.includes('blog'))) score += 2;
      if (cam.video && cam.video.includes('4K')) score += 2;
      if (cam.video && cam.video.includes('6K')) score += 3;
      if (cam.video && cam.video.includes('8K')) score += 4;
      if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
    }
    if (additional2 === 'no') {
      if (cam.goals && cam.goals.includes('photo') && !cam.goals.includes('video')) score += 2;
      if (cam.sensor && cam.sensor.includes('Full frame')) score += 2;
    }

    if (additional3 === 'yes') {
      if (cam.weight === 'critical' || cam.weight === 'moderate') score += 2;
      if (cam.sensor && cam.sensor.includes('Full frame')) score += 2;
      if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
      if (cam.sensor && cam.sensor.includes('Средний формат')) score += 1;
      if (cam.interchangeable === false) score += 1;
    }
    if (additional3 === 'no') {
      if (cam.interchangeable === false) score += 1;
      if (cam.badge && cam.badge.includes('compact')) score += 1;
    }

    return Math.min(10, Math.max(0, score));
  }

  function getWeights(state) {
    let w = { budget: 0.20, goals: 0.15, genres: 0.15, weight: 0.10, system: 0.10, level: 0.15, extras: 0.15 };
    if (state.budget === 'low') { w.budget = 0.35; w.goals = 0.12; w.genres = 0.12; w.weight = 0.08; w.system = 0.05; w.level = 0.15; w.extras = 0.13; }
    else if (state.budget === 'mid') { w.budget = 0.25; w.goals = 0.15; w.genres = 0.15; w.weight = 0.10; w.system = 0.08; w.level = 0.12; w.extras = 0.15; }
    else if (state.budget === 'high') { w.budget = 0.20; w.goals = 0.15; w.genres = 0.15; w.weight = 0.10; w.system = 0.10; w.level = 0.15; w.extras = 0.15; }
    else if (state.budget === 'very-high' || state.budget === 'premium') { w.budget = 0.15; w.goals = 0.15; w.genres = 0.15; w.weight = 0.10; w.system = 0.10; w.level = 0.15; w.extras = 0.20; }
    if (state.weight === 'critical') { w.weight = 0.25; const total = 1 - w.weight; const scale = total / (1 - 0.10); w.budget *= scale; w.goals *= scale; w.genres *= scale; w.system *= scale; w.level *= scale; w.extras *= scale; }
    if (state.level === 'pro' && state.proIntent === 'replace') { w.system = 0.25; const total = 1 - w.system; const scale = total / (1 - 0.10); w.budget *= scale; w.goals *= scale; w.genres *= scale; w.weight *= scale; w.level *= scale; w.extras *= scale; }
    if (state.level === 'blogger') { w.extras = 0.25; const total = 1 - w.extras; const scale = total / (1 - 0.15); w.budget *= scale; w.goals *= scale; w.genres *= scale; w.weight *= scale; w.system *= scale; w.level *= scale; }
    const sum = Object.values(w).reduce((a, b) => a + b, 0);
    for (const key in w) w[key] /= sum;
    return w;
  }

  function computeScore(cam) {
    const weights = getWeights(state);
    const scores = {
      budget: getBudgetScore(cam.budgetRange, state.budget),
      goals: getMatchScore(cam.goals, state.goals),
      genres: getMatchScore(cam.genres, state.genres),
      weight: getWeightScore(cam.weight, state.weight),
      system: getSystemScore(cam.system, state.system, state.proIntent, state.level),
      level: getLevelScore(cam, state.level),
      extras: getExtrasScore(cam, state)
    };
    let total = 0;
    for (const key in scores) total += scores[key] * weights[key];
    total += (cam.bonus || 0);
    return total;
  }

  // ─── ПОЛУЧЕНИЕ ОТСОРТИРОВАННЫХ КАМЕР ──────────────────────
  function getScoredCameras() {
    const allowedBudgets = getAllowedBudgetLevels(state.budget);
    let filtered = allCameras.filter(cam => cam.budgetRange.some(b => allowedBudgets.includes(b)));
    const scored = filtered.map(cam => ({ ...cam, score: computeScore(cam) }));
    scored.sort((a, b) => b.score - a.score);
    const unique = [];
    const seen = new Set();
    for (const cam of scored) {
      if (!seen.has(cam.id)) { unique.push(cam); seen.add(cam.id); }
    }
    if (state.level === 'pro' && state.proIntent === 'replace' && state.system) {
      const altPositive = unique.filter(c => c.system !== state.system && c.score > 0);
      if (altPositive.length >= 4) return unique.filter(c => c.system !== state.system);
    }
    return unique;
  }

  // ─── НАВИГАЦИЯ ──────────────────────────────────────────────
  function goForward() {
    const visible = getVisibleSteps();
    const cur = visible.findIndex(s => s.id === STEP_DEFS[currentStepIdx].id);
    if (cur === -1 || cur >= visible.length - 1) return;
    const next = visible[cur + 1];
    currentStepIdx = STEP_DEFS.indexOf(next);
    renderStep();
  }

  function goBack() {
    const visible = getVisibleSteps();
    const cur = visible.findIndex(s => s.id === STEP_DEFS[currentStepIdx].id);
    if (cur <= 0) return;
    const prev = visible[cur - 1];
    currentStepIdx = STEP_DEFS.indexOf(prev);
    renderStep();
  }

  function finish() { renderResult(); }

  function resetAll() {
    Object.keys(state).forEach(k => { if (Array.isArray(state[k])) state[k] = []; else state[k] = null; });
    currentStepIdx = 0;
    document.getElementById('hdrMeta').textContent = '';
    renderStep();
  }

  function goBackToQuestions() {
    const visible = getVisibleSteps();
    if (visible.length > 0) {
      currentStepIdx = STEP_DEFS.indexOf(visible[0]);
      renderStep();
    }
  }

  function selectSingle(field, val) { state[field] = val; renderStep(); }
  function toggleMulti(field, val) {
    if (!state[field]) state[field] = [];
    const arr = state[field];
    const idx = arr.indexOf(val);
    if (idx > -1) arr.splice(idx, 1);
    else arr.push(val);
    renderStep();
  }

  // ─── APERTURE SVG ──────────────────────────────────────────
  function apertureSVG(openness) {
    const blades = 6;
    const cx = 50, cy = 50;
    let paths = '';
    for (let i = 0; i < blades; i++) {
      const angle = (360 / blades) * i;
      const scale = 1 - openness * 0.62;
      paths += `<g class="aperture-blade" style="transform: rotate(${angle}deg) scale(${scale})">
        <path d="M 50 50 L 50 4 A 46 46 0 0 1 88 26 Z" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      </g>`;
    }
    return `<svg class="aperture-svg" width="60" height="60" viewBox="0 0 100 100">
      <circle cx="${cx}" cy="${cy}" r="42" fill="none" stroke="var(--border)" stroke-width="1"/>
      ${paths}
      <circle cx="${cx}" cy="${cy}" r="${4 + openness * 14}" fill="var(--ink)" />
    </svg>`;
  }

  function renderAperture(stepIdx, total) {
    const openness = stepIdx / total;
    const apertureWrap = document.getElementById('apertureWrap');
    apertureWrap.innerHTML = `
      ${apertureSVG(openness)}
      <div class="aperture-track">
        <div class="aperture-step-label">f/${(1.4 + openness * 20).toFixed(1)} · шаг ${Math.min(stepIdx+1, total)} из ${total}</div>
        <div class="aperture-bar"><div class="aperture-bar-fill" style="width:${(stepIdx/total)*100}%"></div></div>
      </div>`;
  }

  // ─── RENDER STEP ────────────────────────────────────────────
  function renderStep() {
    const screen = document.getElementById('screen');
    const visible = getVisibleSteps();
    if (visible.length === 0) return;
    let step = STEP_DEFS[currentStepIdx];
    if (!step || !visible.includes(step)) {
      currentStepIdx = STEP_DEFS.indexOf(visible[0]);
      step = visible[0];
    }
    const total = visible.length;
    const curIdx = visible.indexOf(step);
    renderAperture(curIdx, total);

    const label = step.id === 'additional1' || step.id === 'additional2' ?
      getStepLabel(step.id) : step.title;
    const opts = getDynamicOpts(step.id);
    const isMulti = step.type === 'multi';
    const completed = isStepComplete(step.id);

    // Хлебные крошки
    const labels = {
      level: 'Уровень', firstCamera: 'Первая камера', proIntent: 'Замена или вторая',
      system: 'Система', goals: 'Цели', genres: 'Жанры', weight: 'Вес', budget: 'Бюджет',
      experience: 'Опыт', lenses: 'Объективы',
      additional1: (state.level === 'beginner') ? 'Редактирование' : (state.level === 'pro' ? 'RAW' :
        ((state.goals || []).includes('video') || (state.goals || []).includes('blog') ? 'Log' : 'RAW')),
      additional2: (state.level === 'beginner') ? 'Видео' : (state.level === 'pro' ? 'JPG' : ((state.goals || []).includes('video') || (state.goals || []).includes('blog') ? '4K' : 'Печать')),
      additional3: 'Условия'
    };
    const crumbs = [];
    for (let i = 0; i <= curIdx; i++) {
      const st = visible[i];
      if (st) crumbs.push(labels[st.id] || st.id);
    }
    document.getElementById('hdrMeta').textContent = crumbs.join(' › ');

    // Генерация опций (без эмодзи)
    let optsHtml = '';
    if (isMulti) {
      optsHtml = opts.map(o => {
        const isChecked = (state[step.id] || []).includes(o.val);
        const checked = isChecked ? 'checked' : '';
        const sel = isChecked ? 'selected' : '';
        return `<div class="opt ${sel}" data-field="${step.id}" data-val="${o.val}" data-multi="true">
                  <input type="checkbox" ${checked} style="display:none;">
                  <span class="opt-index">${String(opts.indexOf(o)+1).padStart(2,'0')}</span>
                  <div class="opt-body">
                    <div class="opt-title">${o.title}</div>
                    ${o.sub ? `<div class="opt-hint">${o.sub}</div>` : ''}
                  </div>
                  <div class="opt-mark square"></div>
                </div>`;
      }).join('');
    } else {
      optsHtml = opts.map(o => {
        const sel = state[step.id] === o.val ? 'selected' : '';
        return `<div class="opt ${sel}" data-field="${step.id}" data-val="${o.val}" data-multi="false">
                  <span class="opt-index">${String(opts.indexOf(o)+1).padStart(2,'0')}</span>
                  <div class="opt-body">
                    <div class="opt-title">${o.title}</div>
                    ${o.sub ? `<div class="opt-hint">${o.sub}</div>` : ''}
                  </div>
                  <div class="opt-mark"></div>
                </div>`;
      }).join('');
    }

    const nextVisible = visible[curIdx + 1] || null;
    const prevVisible = curIdx > 0 ? visible[curIdx - 1] : null;
    const isLast = !nextVisible;

    screen.innerHTML = `
      <div class="q-block">
        <div class="q-eyebrow">${step.label}</div>
        <div class="q-title">${label}</div>
        ${step.title ? `<div class="q-sub">${step.title}</div>` : ''}
        <div class="opts" id="opts">${optsHtml}</div>
        <div class="actions">
          <button class="btn-text" id="btnBack" ${!prevVisible ? 'disabled' : ''}>← назад</button>
          <span></span>
          <button class="btn-shutter" id="btnNext" ${!completed ? 'disabled' : ''}>
            ${isLast ? 'Показать камеры' : 'Далее'}
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5h11M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.4"/></svg>
          </button>
        </div>
      </div>`;

    // Обработчики
    document.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', function(e) {
        const field = this.dataset.field;
        const val = this.dataset.val;
        const multi = this.dataset.multi === 'true';
        if (multi) {
          const checkbox = this.querySelector('input[type="checkbox"]');
          if (checkbox) {
            checkbox.checked = !checkbox.checked;
          }
          toggleMulti(field, val);
        } else {
          selectSingle(field, val);
        }
      });
    });

    document.getElementById('btnBack').addEventListener('click', goBack);
    document.getElementById('btnNext').addEventListener('click', function() {
      if (this.disabled) return;
      if (isLast) finish();
      else goForward();
    });
  }

  // ─── RENDER RESULTS ─────────────────────────────────────────
  function ringSVG(score, isTop) {
    const r = 24, circumference = 2 * Math.PI * r;
    const offset = circumference * (1 - score / 100);
    return `<svg class="score-ring" width="64" height="64" viewBox="0 0 64 64">
      <circle class="score-ring-bg" cx="32" cy="32" r="${r}"/>
      <circle class="score-ring-fill" cx="32" cy="32" r="${r}"
        stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
        data-final-offset="${offset}"/>
    </svg>`;
  }

  function renderResult() {
    const screen = document.getElementById('screen');
    const visible = getVisibleSteps();
    renderAperture(visible.length, visible.length);
    document.getElementById('hdrMeta').textContent = 'результат';

    const scored = getScoredCameras();
    const top = scored.slice(0, 4);

    if (top.length === 0) {
      screen.innerHTML = `
        <div class="not-found">
          <div class="nf-mark">∅</div>
          <h3>К сожалению, подходящих камер не найдено</h3>
          <p>Попробуйте изменить параметры (бюджет, цели или жанры).</p>
          <button class="btn-shutter" id="backToQuestions" style="font-size:15px;padding:0.7rem 2rem;">← Вернуться к вопросам</button>
        </div>
      `;
      document.getElementById('backToQuestions').addEventListener('click', goBackToQuestions);
      return;
    }

    const levelName = LEVEL_LABELS[state.level] || state.level;
    const budgetName = BUDGET_LABELS[state.budget] || state.budget;
    const goalList = (state.goals || []).map(g => GOAL_LABELS[g] || g).join(', ') || 'не указаны';
    const genreList = (state.genres || []).map(g => GENRE_LABELS[g] || g).join(', ') || 'не указаны';
    let summary = `Подобрано для <strong>${levelName}</strong>`;
    if (state.budget) summary += ` с <strong>${budgetName}</strong>`;
    if (state.system && state.system !== 'other') {
      if (state.level === 'pro' && state.proIntent === 'replace') {
        summary += `, который хочет сменить систему <strong>${state.system.toUpperCase()}</strong> на другую`;
      } else {
        summary += `, который уже имеет систему <strong>${state.system.toUpperCase()}</strong>`;
      }
    }
    summary += `. Цели: <strong>${goalList}</strong>. Жанры: <strong>${genreList}</strong>.`;

    function getAvitoUrl(camName) {
      const clean = camName.replace(/\s*\([^)]*\)/g, '').trim();
      return `https://www.avito.ru/all?q=${encodeURIComponent(clean)}`;
    }

    function coverageHtml(cam) {
      const userGoals = state.goals || [];
      const userGenres = state.genres || [];
      let parts = [];
      if (userGoals.length) {
        const covered = userGoals.filter(g => cam.goals && cam.goals.includes(g));
        const missed = userGoals.filter(g => !cam.goals || !cam.goals.includes(g));
        const coveredStr = covered.map(g => GOAL_LABELS[g] || g).join(', ');
        const missedStr = missed.map(g => GOAL_LABELS[g] || g).join(', ');
        if (coveredStr) parts.push(`✅ ${coveredStr}`);
        if (missedStr) parts.push(`❌ ${missedStr}`);
      }
      if (userGenres.length) {
        const covered = userGenres.filter(g => cam.genres && cam.genres.includes(g));
        const missed = userGenres.filter(g => !cam.genres || !cam.genres.includes(g));
        const coveredStr = covered.map(g => GENRE_LABELS[g] || g).join(', ');
        const missedStr = missed.map(g => GENRE_LABELS[g] || g).join(', ');
        if (coveredStr) parts.push(`🎯 ${coveredStr}`);
        if (missedStr) parts.push(`⛔ ${missedStr}`);
      }
      return parts.length ? parts.join(' · ') : '—';
    }

    function cardHtml(cam, idx) {
      const isPrimary = idx === 0;
      const pct = Math.round(cam.score);
      const badgePrimary = isPrimary ? `<span class="cam-tag pick">рекомендуем</span>` : '';
      const marketBadge = cam.badge ? `<span class="cam-tag">${cam.badgeText || cam.badge}</span>` : '';
      const checkpoints = cam.checkpoints ? cam.checkpoints.map(cp => `<span class="spec">${cp}</span>`).join('') : '';
      const avitoUrl = getAvitoUrl(cam.name);
      const coverage = coverageHtml(cam);

      return `
        <div class="cam-card${isPrimary ? ' top' : ''}">
          <div class="score-ring-wrap">
            ${ringSVG(pct, isPrimary)}
            <span class="score-num">${pct}%</span>
          </div>
          <div class="cam-main">
            <div class="cam-row1">
              <span class="cam-name">${cam.name}</span>
              <span class="cam-price">${cam.price}</span>
            </div>
            <div class="cam-tagrow">
              ${marketBadge}
              ${badgePrimary}
            </div>
            <div class="cam-reasons">
              ${isPrimary ? '<div class="reason">Лучший выбор по вашим критериям</div>' : ''}
            </div>
            <div class="cam-specs">${checkpoints}</div>
            <div class="cam-note">${cam.note || ''}</div>
            <div class="cam-foot">
              <a class="avito-link" href="${avitoUrl}" target="_blank" rel="noopener">найти на авито</a>
            </div>
          </div>
        </div>
      `;
    }

    screen.innerHTML = `
      <div class="r-head">
        <div class="r-eyebrow">выдержка зафиксирована</div>
        <div class="r-title">Топ-4 камеры для вас</div>
        <div class="r-sub">${summary}</div>
      </div>
      <div class="cam-list">${top.map((cam, i) => cardHtml(cam, i)).join('')}</div>
      <div class="r-foot">
        <button class="link-btn" id="backToQuestions">← изменить ответы</button>
        <button class="link-btn" id="resetAll">начать заново</button>
      </div>
    `;

    // Анимация колец
    requestAnimationFrame(() => {
      document.querySelectorAll('.score-ring-fill').forEach((el, index) => {
        setTimeout(() => {
          el.style.strokeDashoffset = el.dataset.finalOffset;
        }, 50 + index * 150);
      });
    });

    document.getElementById('backToQuestions').addEventListener('click', goBackToQuestions);
    document.getElementById('resetAll').addEventListener('click', resetAll);
  }

  // ─── СТАРТ ──────────────────────────────────────────────────
  loadCameras();

})();
</script>
</body>
</html>
