<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подбор камеры — умный помощник</title>
    <style>
        /* ===== Стили (те же, что были, но можно оставить как есть) ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            font-size: 15px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrap {
            max-width: 820px;
            margin: 0 auto;
            background: #fff;
            padding: 2rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.07);
            width: 100%;
        }
        .progress {
            display: flex;
            gap: 6px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .progress-step {
            height: 4px;
            flex: 1 0 6%;
            background: #e5e5e5;
            border-radius: 2px;
            transition: background .4s ease;
        }
        .progress-step.done {
            background: #1a1a1a;
        }
        .progress-step.active {
            background: #888;
        }
        .breadcrumb {
            font-size: 12px;
            color: #999;
            margin-bottom: 1rem;
            min-height: 20px;
        }
        .step-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: .4rem;
        }
        .step-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 1.25rem;
            line-height: 1.3;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }
        .opt {
            display: flex;
            align-items: flex-start;
            gap: .875rem;
            border: 1.5px solid #e5e5e5;
            border-radius: 12px;
            padding: .875rem 1rem;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            background: #fff;
            user-select: none;
        }
        .opt:hover {
            border-color: #bbb;
            background: #fafafa;
        }
        .opt.selected {
            border-color: #1a1a1a;
            background: #f0f0f0;
        }
        .opt-icon {
            font-size: 22px;
            flex-shrink: 0;
            line-height: 1.2;
        }
        .opt-text {
            flex: 1;
        }
        .opt-title {
            font-size: 14px;
            font-weight: 500;
        }
        .opt-sub {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .opt input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #1a1a1a;
        }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.8rem;
            width: 100%;
        }
        .btn-next {
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.9rem 2.5rem;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
            min-width: 200px;
            text-align: center;
        }
        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-next:hover:not(:disabled) {
            opacity: 0.85;
        }
        .btn-back {
            background: transparent;
            border: 1.5px solid #ccc;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            transition: border-color .2s;
        }
        .btn-back:hover {
            border-color: #888;
            background: #f5f5f5;
        }
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 640px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
        .cam-card {
            border: 1.5px solid #e5e5e5;
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
            transition: box-shadow .2s;
        }
        .cam-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }
        .cam-card.primary {
            border-color: #1a1a1a;
            border-width: 2px;
        }
        .card-category {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #888;
            padding: .5rem .75rem 0;
        }
        .cam-card.primary .card-category {
            color: #1a1a1a;
        }
        .cam-badge-wrap {
            padding: .25rem .75rem .25rem;
            display: flex;
            gap: .375rem;
            flex-wrap: wrap;
        }
        .cam-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .badge-rec {
            background: #1a1a1a;
            color: #fff;
        }
        .badge-alt {
            background: #f0f0f0;
            color: #555;
        }
        .badge-bu {
            background: #fff3cd;
            color: #856404;
        }
        .badge-new {
            background: #d6f0ff;
            color: #0a5a8a;
        }
        .badge-compact {
            background: #e6f7e6;
            color: #2b7a2b;
        }
        .badge-video {
            background: #fce4ec;
            color: #c62828;
        }
        .badge-premium {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        .cam-img-wrap {
            background: #f7f7f7;
            padding: .8rem;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        .cam-body {
            padding: .75rem 1rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .cam-model {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .cam-price {
            font-size: 13px;
            color: #888;
            margin-bottom: .5rem;
        }
        .cam-checkpoints {
            list-style: none;
            margin: 0 0 .4rem 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: .15rem;
        }
        .cam-checkpoints li {
            font-size: 12px;
            color: #333;
            display: flex;
            gap: .4rem;
            line-height: 1.4;
            align-items: baseline;
        }
        .cam-checkpoints li::before {
            content: "✔️";
            font-size: 11px;
            color: #2b7a2b;
            flex-shrink: 0;
        }
        .cam-coverage {
            font-size: 11px;
            color: #666;
            padding: .4rem 0 .2rem;
            border-top: 1px solid #f0f0f0;
            margin-top: .3rem;
            line-height: 1.6;
        }
        .cam-note {
            font-size: 12px;
            color: #555;
            margin-top: auto;
            padding-top: .6rem;
            border-top: 1px solid #f0f0f0;
            line-height: 1.4;
        }
        .avito-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background: #41A7E4;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background .2s;
        }
        .avito-btn:hover {
            background: #3596c7;
        }
        .result-summary {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        .result-summary strong {
            color: #1a1a1a;
        }
        .buttons-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .reset-btn,
        .back-btn {
            font-size: 13px;
            color: #555;
            background: none;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            padding: .45rem 1.5rem;
            cursor: pointer;
            transition: border-color .2s;
        }
        .reset-btn:hover,
        .back-btn:hover {
            border-color: #aaa;
            background: #f8f8f8;
        }
        .back-btn {
            background: #f0f0f0;
        }
        .fade-in {
            animation: fadeIn .35s ease forwards;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .not-found {
            text-align: center;
            padding: 2rem 1rem;
        }
        .not-found .emoji {
            font-size: 48px;
            margin-bottom: 1rem;
        }
        .not-found h3 {
            font-size: 20px;
            margin-bottom: .5rem;
        }
        .not-found p {
            color: #666;
            max-width: 400px;
            margin: 0 auto 1.5rem;
        }
        .loading {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="wrap" id="app">
        <div class="progress" id="progressBar"></div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div id="screen" class="fade-in">
            <div class="loading">⏳ Загрузка базы камер...</div>
        </div>
    </div>

    <script>
        // ─── ВСЯ ЛОГИКА ВНУТРИ IIFE, ЧТОБЫ НЕ КОНФЛИКТОВАТЬ ──────
        (function() {
            "use strict";

            // ─── КОНСТАНТЫ (метки, списки) ──────────────────────────
            const GENRE_LABELS = {
                portrait: 'Портрет',
                landscape: 'Пейзаж',
                street: 'Стрит',
                reportage: 'Репортаж',
                wedding: 'Свадьбы',
                family: 'Семьи',
                nude: 'Ню',
                commercial: 'Реклама',
                architecture: 'Архитектура',
                vlog: 'Влог',
                documentary: 'Документалистика'
            };

            const GOAL_LABELS = {
                photo: 'фотографии',
                video: 'видеосъёмке',
                blog: 'блогингу',
                travel: 'путешествиям',
                studio: 'студийной работе',
                sport: 'спортивной съёмке'
            };

            const LEVEL_LABELS = {
                beginner: 'новичка',
                enthusiast: 'любителя',
                pro: 'профессионала',
                blogger: 'блогера'
            };

            const BUDGET_LABELS = {
                low: 'ограниченном бюджете',
                mid: 'среднем бюджете',
                high: 'хорошем бюджете',
                'very-high': 'высоком бюджете',
                premium: 'премиальном бюджете'
            };

            const BUDGET_RANGES = ['low', 'mid', 'high', 'very-high', 'premium'];

            // ─── ШАГИ ОПРОСНИКА ──────────────────────────────────────
            const STEP_DEFS = [{
                id: 'level',
                label: 'Шаг 1 из ?',
                title: 'Как ты себя оцениваешь?',
                type: 'single',
                opts: [
                    { val: 'beginner', icon: '🌱', title: 'Новичок' },
                    { val: 'enthusiast', icon: '📸', title: 'Любитель' },
                    { val: 'pro', icon: '🎯', title: 'Профи' },
                    { val: 'blogger', icon: '🎬', title: 'Блогер' }
                ]
            }, {
                id: 'firstCamera',
                label: 'Шаг 2 из ?',
                title: 'Это твоя первая камера?',
                type: 'single',
                opts: [
                    { val: 'yes', icon: '✅', title: 'Да, первая' },
                    { val: 'no', icon: '🔄', title: 'Нет, уже была' }
                ],
                visibility: (s) => s.level !== 'pro'
            }, {
                id: 'proIntent',
                label: 'Шаг 2 из ?',
                title: 'Что ты ищешь?',
                type: 'single',
                visibility: (s) => s.level === 'pro',
                opts: [
                    { val: 'replace', icon: '🔄', title: 'Заменяю систему', sub: 'Хочу попробовать другой бренд' },
                    { val: 'second', icon: '➕', title: 'Вторую камеру', sub: 'Можно той же системы, можно другой' }
                ]
            }, {
                id: 'system',
                label: 'Шаг 3 из ?',
                title: 'Твоя текущая система?',
                type: 'single',
                opts: [
                    { val: 'canon', icon: '🔴', title: 'Canon' },
                    { val: 'nikon', icon: '🔵', title: 'Nikon' },
                    { val: 'sony', icon: '🟢', title: 'Sony' },
                    { val: 'fujifilm', icon: '🟠', title: 'Fujifilm' },
                    { val: 'panasonic', icon: '🟣', title: 'Panasonic' },
                    { val: 'hasselblad', icon: '🟡', title: 'Hasselblad' },
                    { val: 'leica', icon: '⚪', title: 'Leica' },
                    { val: 'other', icon: '❓', title: 'Другая' }
                ],
                visibility: (s) => {
                    if (s.level === 'pro') return !!s.proIntent;
                    return s.firstCamera === 'no';
                }
            }, {
                id: 'goals',
                label: 'Шаг 4 из ?',
                title: 'Для каких целей? (выберите несколько)',
                type: 'multi',
                opts: [
                    { val: 'photo', icon: '🖼', title: 'Фото' },
                    { val: 'video', icon: '🎬', title: 'Видео' },
                    { val: 'blog', icon: '📱', title: 'Блог' },
                    { val: 'travel', icon: '✈️', title: 'Путешествия' },
                    { val: 'studio', icon: '💡', title: 'Студия' },
                    { val: 'sport', icon: '🏃', title: 'Спорт' }
                ]
            }, {
                id: 'genres',
                label: 'Шаг 5 из ?',
                title: 'Какие жанры? (выберите несколько)',
                type: 'multi',
                opts: [
                    { val: 'portrait', icon: '👤', title: 'Портрет' },
                    { val: 'landscape', icon: '🏞️', title: 'Пейзаж' },
                    { val: 'street', icon: '🚦', title: 'Стрит' },
                    { val: 'reportage', icon: '📰', title: 'Репортаж' },
                    { val: 'wedding', icon: '💒', title: 'Свадьбы' },
                    { val: 'family', icon: '👨‍👩‍👧‍👦', title: 'Семьи' },
                    { val: 'nude', icon: '🎨', title: 'Ню' },
                    { val: 'commercial', icon: '📺', title: 'Реклама' },
                    { val: 'architecture', icon: '🏛️', title: 'Архитектура' }
                ]
            }, {
                id: 'weight',
                label: 'Шаг 6 из ?',
                title: 'Насколько критичен вес?',
                type: 'single',
                opts: [
                    { val: 'critical', icon: '🏋️', title: 'Очень критичен' },
                    { val: 'moderate', icon: '⚖️', title: 'Умеренно' },
                    { val: 'not-critical', icon: '🏋️‍♂️', title: 'Не критичен' }
                ]
            }, {
                id: 'budget',
                label: 'Шаг 7 из ?',
                title: 'Бюджет',
                type: 'single',
                opts: [
                    { val: 'low', icon: '💸', title: 'До $400' },
                    { val: 'mid', icon: '💰', title: '$400–1000' },
                    { val: 'high', icon: '💎', title: '$1000–2000' },
                    { val: 'very-high', icon: '👑', title: '$2000–3000' },
                    { val: 'premium', icon: '🚀', title: '$3000+' }
                ]
            }, {
                id: 'experience',
                label: 'Шаг 8 из ?',
                title: 'Какой у тебя опыт съёмки?',
                type: 'single',
                visibility: (s) => s.level === 'beginner',
                opts: [
                    { val: 'none', icon: '👶', title: 'Совсем нет' },
                    { val: 'some', icon: '🧒', title: 'Немного' },
                    { val: 'experienced', icon: '🧑‍🎓', title: 'Есть опыт' }
                ]
            }, {
                id: 'lenses',
                label: 'Шаг 9 из ?',
                title: 'Какие объективы тебе нужны?',
                type: 'single',
                visibility: (s) => s.level === 'pro',
                opts: [
                    { val: 'kit', icon: '🔭', title: 'Кит' },
                    { val: 'prime', icon: '📷', title: 'Фиксы' },
                    { val: 'zoom', icon: '🔍', title: 'Зумы' }
                ]
            }, {
                id: 'additional1',
                label: 'Шаг 10 из ?',
                title: '',
                type: 'single',
                visibility: (s) => s.level !== 'beginner',
                opts: []
            }, {
                id: 'additional2',
                label: 'Шаг 11 из ?',
                title: '',
                type: 'single',
                visibility: (s) => s.level !== 'beginner',
                opts: []
            }, {
                id: 'additional3',
                label: 'Шаг 12 из ?',
                title: 'Съёмка в сложных условиях?',
                type: 'single',
                visibility: (s) => s.level !== 'beginner',
                opts: [
                    { val: 'yes', icon: '🌧️', title: 'Да' },
                    { val: 'no', icon: '☀️', title: 'Нет' }
                ]
            }];

            // ─── СОСТОЯНИЕ ─────────────────────────────────────────────
            const state = {
                level: null,
                firstCamera: null,
                proIntent: null,
                system: null,
                goals: [],
                genres: [],
                weight: null,
                budget: null,
                experience: null,
                lenses: null,
                additional1: null,
                additional2: null,
                additional3: null
            };

            let currentStepIdx = 0;
            let allCameras = []; // сюда загрузим из JSON

            // ─── ЗАГРУЗКА БАЗЫ КАМЕР ──────────────────────────────────
            async function loadCameras() {
                try {
                    const url = 'https://raw.githubusercontent.com/alexeynovopashin-lab/CameraChange/main/cameras.json';
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Ошибка загрузки JSON');
                    const data = await response.json();
                    allCameras = data.cameras || [];
                    renderStep(); // после загрузки запускаем опросник
                } catch (e) {
                    console.error('Не удалось загрузить базу камер:', e);
                    document.getElementById('screen').innerHTML = `
                        <div class="not-found">
                            <div class="emoji">⚠️</div>
                            <h3>Не удалось загрузить базу камер</h3>
                            <p>Проверьте интернет или обновите страницу.</p>
                            <button class="btn-back" onclick="location.reload()">Обновить</button>
                        </div>
                    `;
                }
            }

            // ─── ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ ВИДИМОСТИ ШАГОВ ────────
            function getVisibleSteps() {
                return STEP_DEFS.filter(st => {
                    if (st.visibility) return st.visibility(state);
                    return true;
                });
            }

            function getStepLabel(stepId) {
                const lvl = state.level;
                const goals = state.goals || [];
                const isVideo = goals.includes('video') || goals.includes('blog');

                if (stepId === 'additional1') {
                    if (lvl === 'beginner') return 'Хочешь ли ты редактировать фото на компьютере?';
                    if (lvl === 'pro') return 'Предпочитаете снимать в RAW?';
                    return isVideo ? 'Планируешь снимать в Log?' : 'Есть ли опыт работы с RAW?';
                }
                if (stepId === 'additional2') {
                    if (lvl === 'beginner') return 'Будешь ли снимать видео для YouTube/TikTok?';
                    if (lvl === 'pro') return 'Хотите получить вкусный цвет сразу в JPG?';
                    return isVideo ? 'Нужно ли тебе 4K?' : 'Планируешь печатать снимки?';
                }
                const def = STEP_DEFS.find(s => s.id === stepId);
                return def ? def.title : '';
            }

            function getDynamicOpts(stepId) {
                if (stepId === 'additional1' || stepId === 'additional2') {
                    return [
                        { val: 'yes', icon: '✅', title: 'Да' },
                        { val: 'no', icon: '❌', title: 'Нет' }
                    ];
                }
                const def = STEP_DEFS.find(s => s.id === stepId);
                return def ? def.opts : [];
            }

            function isStepComplete(stepId) {
                const val = state[stepId];
                if (Array.isArray(val)) return val.length > 0;
                return !!val;
            }

            // ─── СКОРИНГ (ВЗВЕШЕННЫЙ) ─────────────────────────────────

            // Оценка бюджета: точное попадание 10, соседний 7, через один 4, дальше 1
            function getBudgetScore(camBudgetRanges, userBudget) {
                if (!userBudget) return 5;
                const idx = BUDGET_RANGES.indexOf(userBudget);
                if (idx === -1) return 0;
                let best = 0;
                for (const b of camBudgetRanges) {
                    const bi = BUDGET_RANGES.indexOf(b);
                    if (bi === -1) continue;
                    const diff = Math.abs(bi - idx);
                    if (diff === 0) best = Math.max(best, 10);
                    else if (diff === 1) best = Math.max(best, 7);
                    else if (diff === 2) best = Math.max(best, 4);
                    else best = Math.max(best, 1);
                }
                return best;
            }

            // Совпадение целей или жанров: процент совпадения * 10
            function getMatchScore(camItems, userItems) {
                if (!userItems || userItems.length === 0) return 5;
                if (!camItems || camItems.length === 0) return 0;
                const matches = camItems.filter(item => userItems.includes(item)).length;
                const total = userItems.length;
                return (matches / total) * 10;
            }

            // Оценка по весу
            function getWeightScore(camWeight, userWeight) {
                if (!userWeight) return 5;
                if (userWeight === 'critical') {
                    if (camWeight === 'critical') return 10;
                    if (camWeight === 'moderate') return 5;
                    return 0;
                }
                if (userWeight === 'moderate') {
                    if (camWeight === 'moderate' || camWeight === 'critical') return 8;
                    return 4;
                }
                return 10; // вес не важен
            }

            // Оценка по системе
            function getSystemScore(camSystem, userSystem, proIntent, level) {
                if (!userSystem || userSystem === 'other') return 5;
                if (camSystem === userSystem) {
                    if (level === 'pro' && proIntent === 'replace') return 0; // штраф
                    return 10;
                } else {
                    return 5;
                }
            }

            // Оценка по уровню пользователя
            function getLevelScore(cam, level) {
                if (level === 'beginner') {
                    let score = 5;
                    if (cam.interchangeable === false) score += 3;
                    if (cam.sensor && cam.sensor.includes('APS-C')) score += 2;
                    if (cam.badge && cam.badge.includes('bu')) score += 1;
                    if (cam.sensor && cam.sensor.includes('Full frame')) score -= 2;
                    return Math.min(10, Math.max(0, score));
                }
                if (level === 'pro') {
                    let score = 5;
                    if (cam.dualSlot) score += 3;
                    if (cam.sensor && (cam.sensor.includes('Full frame') || cam.sensor.includes('Средний формат')))
                        score += 3;
                    if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
                    if (cam.video && cam.video.includes('8K')) score += 2;
                    if (cam.af && cam.af.includes('AI')) score += 2;
                    if (cam.interchangeable) score += 1;
                    return Math.min(10, Math.max(0, score));
                }
                if (level === 'blogger') {
                    let score = 5;
                    if (cam.goals && (cam.goals.includes('video') || cam.goals.includes('blog'))) score += 3;
                    if (cam.weight === 'critical') score += 2;
                    if (cam.interchangeable === false) score += 2;
                    if (cam.video && cam.video.includes('4K')) score += 2;
                    return Math.min(10, Math.max(0, score));
                }
                // enthusiast
                let score = 5;
                if (cam.goals && cam.goals.includes('photo') && cam.goals.includes('video')) score += 2;
                if (cam.sensor && cam.sensor.includes('APS-C')) score += 1;
                if (cam.interchangeable) score += 1;
                if (cam.dualSlot) score += 1;
                return Math.min(10, Math.max(0, score));
            }

            // Оценка дополнительных требований (RAW, видео, условия)
            function getExtrasScore(cam, state) {
                let score = 5;
                const { additional1, additional2, additional3, goals } = state;
                const isVideoUser = goals && (goals.includes('video') || goals.includes('blog'));

                if (additional1 === 'yes') {
                    if (cam.sensor && (cam.sensor.includes('Full frame') || cam.sensor.includes('Средний формат')))
                        score += 2;
                    if (cam.sensor && cam.sensor.includes('X-Trans')) score += 1;
                    if (cam.video && cam.video.includes('RAW')) score += 2;
                }
                if (additional1 === 'no') {
                    if (cam.badge && cam.badge.includes('new')) score += 1;
                    if (cam.sensor && cam.sensor.includes('APS-C')) score += 1;
                    if (cam.interchangeable === false) score += 1;
                }

                if (additional2 === 'yes') {
                    if (isVideoUser && cam.goals && (cam.goals.includes('video') || cam.goals.includes('blog')))
                        score += 2;
                    if (cam.video && cam.video.includes('4K')) score += 2;
                    if (cam.video && cam.video.includes('6K')) score += 3;
                    if (cam.video && cam.video.includes('8K')) score += 4;
                    if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
                }
                if (additional2 === 'no') {
                    if (cam.goals && cam.goals.includes('photo') && !cam.goals.includes('video')) score += 2;
                    if (cam.sensor && cam.sensor.includes('Full frame')) score += 2;
                }

                if (additional3 === 'yes') {
                    if (cam.weight === 'critical' || cam.weight === 'moderate') score += 2;
                    if (cam.sensor && cam.sensor.includes('Full frame')) score += 2;
                    if (cam.stabilization && cam.stabilization.includes('IBIS')) score += 2;
                    if (cam.sensor && cam.sensor.includes('Средний формат')) score += 1;
                    if (cam.interchangeable === false) score += 1;
                }
                if (additional3 === 'no') {
                    if (cam.interchangeable === false) score += 1;
                    if (cam.badge && cam.badge.includes('compact')) score += 1;
                }

                return Math.min(10, Math.max(0, score));
            }

            // Динамические веса критериев в зависимости от состояния
            function getWeights(state) {
                let w = {
                    budget: 0.20,
                    goals: 0.15,
                    genres: 0.15,
                    weight: 0.10,
                    system: 0.10,
                    level: 0.15,
                    extras: 0.15
                };

                if (state.budget === 'low') {
                    w.budget = 0.35;
                    w.goals = 0.12;
                    w.genres = 0.12;
                    w.weight = 0.08;
                    w.system = 0.05;
                    w.level = 0.15;
                    w.extras = 0.13;
                } else if (state.budget === 'mid') {
                    w.budget = 0.25;
                    w.goals = 0.15;
                    w.genres = 0.15;
                    w.weight = 0.10;
                    w.system = 0.08;
                    w.level = 0.12;
                    w.extras = 0.15;
                } else if (state.budget === 'high') {
                    w.budget = 0.20;
                    w.goals = 0.15;
                    w.genres = 0.15;
                    w.weight = 0.10;
                    w.system = 0.10;
                    w.level = 0.15;
                    w.extras = 0.15;
                } else if (state.budget === 'very-high' || state.budget === 'premium') {
                    w.budget = 0.15;
                    w.goals = 0.15;
                    w.genres = 0.15;
                    w.weight = 0.10;
                    w.system = 0.10;
                    w.level = 0.15;
                    w.extras = 0.20;
                }

                if (state.weight === 'critical') {
                    w.weight = 0.25;
                    const total = 1 - w.weight;
                    const scale = total / (1 - 0.10);
                    w.budget *= scale;
                    w.goals *= scale;
                    w.genres *= scale;
                    w.system *= scale;
                    w.level *= scale;
                    w.extras *= scale;
                }

                if (state.level === 'pro' && state.proIntent === 'replace') {
                    w.system = 0.25;
                    const total = 1 - w.system;
                    const scale = total / (1 - 0.10);
                    w.budget *= scale;
                    w.goals *= scale;
                    w.genres *= scale;
                    w.weight *= scale;
                    w.level *= scale;
                    w.extras *= scale;
                }

                if (state.level === 'blogger') {
                    w.extras = 0.25;
                    const total = 1 - w.extras;
                    const scale = total / (1 - 0.15);
                    w.budget *= scale;
                    w.goals *= scale;
                    w.genres *= scale;
                    w.weight *= scale;
                    w.system *= scale;
                    w.level *= scale;
                }

                // Нормализация (сумма должна быть 1)
                const sum = Object.values(w).reduce((a, b) => a + b, 0);
                for (const key in w) {
                    w[key] /= sum;
                }
                return w;
            }

            // Главная функция скоринга
            function computeScore(cam) {
                const weights = getWeights(state);
                const scores = {
                    budget: getBudgetScore(cam.budgetRange, state.budget),
                    goals: getMatchScore(cam.goals, state.goals),
                    genres: getMatchScore(cam.genres, state.genres),
                    weight: getWeightScore(cam.weight, state.weight),
                    system: getSystemScore(cam.system, state.system, state.proIntent, state.level),
                    level: getLevelScore(cam, state.level),
                    extras: getExtrasScore(cam, state)
                };
                let total = 0;
                for (const key in scores) {
                    total += scores[key] * weights[key];
                }
                return total;
            }

            // Получить отсортированный список камер с баллами
            function getScoredCameras() {
                const scored = allCameras.map(cam => ({
                    ...cam,
                    score: computeScore(cam)
                }));
                scored.sort((a, b) => b.score - a.score);

                // Уникальные по id (на всякий случай)
                const unique = [];
                const seen = new Set();
                for (const cam of scored) {
                    if (!seen.has(cam.id)) {
                        unique.push(cam);
                        seen.add(cam.id);
                    }
                }

                // Если профи и замена системы – исключаем камеры той же системы, если есть альтернативы
                if (state.level === 'pro' && state.proIntent === 'replace' && state.system) {
                    const altPositive = unique.filter(c => c.system !== state.system && c.score > 0);
                    if (altPositive.length >= 4) {
                        return unique.filter(c => c.system !== state.system);
                    }
                }
                return unique;
            }

            // ─── НАВИГАЦИЯ И РЕНДЕРИНГ ──────────────────────────────

            function goForward() {
                const visible = getVisibleSteps();
                const cur = visible.findIndex(s => s.id === STEP_DEFS[currentStepIdx].id);
                if (cur === -1 || cur >= visible.length - 1) return;
                const next = visible[cur + 1];
                currentStepIdx = STEP_DEFS.indexOf(next);
                renderStep();
            }

            function goBack() {
                const visible = getVisibleSteps();
                const cur = visible.findIndex(s => s.id === STEP_DEFS[currentStepIdx].id);
                if (cur <= 0) return;
                const prev = visible[cur - 1];
                currentStepIdx = STEP_DEFS.indexOf(prev);
                renderStep();
            }

            function finish() {
                renderResult();
            }

            function resetAll() {
                Object.keys(state).forEach(k => {
                    if (Array.isArray(state[k])) state[k] = [];
                    else state[k] = null;
                });
                currentStepIdx = 0;
                document.getElementById('breadcrumb').textContent = '';
                renderStep();
            }

            function goBackToQuestions() {
                const visible = getVisibleSteps();
                if (visible.length > 0) {
                    currentStepIdx = STEP_DEFS.indexOf(visible[0]);
                    renderStep();
                }
            }

            function selectSingle(field, val) {
                state[field] = val;
                renderStep();
            }

            function toggleMulti(field, val) {
                if (!state[field]) state[field] = [];
                const arr = state[field];
                const idx = arr.indexOf(val);
                if (idx > -1) arr.splice(idx, 1);
                else arr.push(val);
                renderStep();
            }

            function renderProgress(cur, total) {
                const bar = document.getElementById('progressBar');
                let html = '';
                for (let i = 0; i < total; i++) {
                    const cls = i < cur ? 'done' : (i === cur ? 'active' : '');
                    html += `<div class="progress-step ${cls}"></div>`;
                }
                bar.innerHTML = html;
            }

            function renderStep() {
                const screen = document.getElementById('screen');
                const visible = getVisibleSteps();
                if (visible.length === 0) return;

                let step = STEP_DEFS[currentStepIdx];
                if (!step || !visible.includes(step)) {
                    currentStepIdx = STEP_DEFS.indexOf(visible[0]);
                    step = visible[0];
                }

                const total = visible.length;
                const curIdx = visible.indexOf(step);
                renderProgress(curIdx, total);

                const label = step.id === 'additional1' || step.id === 'additional2' ?
                    getStepLabel(step.id) :
                    step.title;

                const opts = getDynamicOpts(step.id);
                const isMulti = step.type === 'multi';
                const completed = isStepComplete(step.id);

                // Хлебные крошки
                const labels = {
                    level: 'Уровень',
                    firstCamera: 'Первая камера',
                    proIntent: 'Замена или вторая',
                    system: 'Система',
                    goals: 'Цели',
                    genres: 'Жанры',
                    weight: 'Вес',
                    budget: 'Бюджет',
                    experience: 'Опыт',
                    lenses: 'Объективы',
                    additional1: (state.level === 'beginner') ? 'Редактирование' : (state.level === 'pro' ? 'RAW' :
                        ((state.goals || []).includes('video') || (state.goals || []).includes('blog') ? 'Log' :
                            'RAW')),
                    additional2: (state.level === 'beginner') ? 'Видео' : (state.level === 'pro' ? 'JPG' : ((state
                        .goals || []).includes('video') || (state.goals || []).includes('blog') ? '4K' :
                        'Печать')),
                    additional3: 'Условия'
                };
                const crumbs = [];
                for (let i = 0; i <= curIdx; i++) {
                    const st = visible[i];
                    if (st) crumbs.push(labels[st.id] || st.id);
                }
                document.getElementById('breadcrumb').textContent = crumbs.join(' › ');

                // Построение HTML опций
                let optsHtml = '';
                if (isMulti) {
                    optsHtml = opts.map(o => {
                        const checked = (state[step.id] || []).includes(o.val) ? 'checked' : '';
                        return `
                            <div class="opt" data-field="${step.id}" data-val="${o.val}" data-multi="true">
                                <input type="checkbox" ${checked}>
                                <div class="opt-icon">${o.icon}</div>
                                <div class="opt-text">
                                    <div class="opt-title">${o.title}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    optsHtml = opts.map(o => {
                        const sel = state[step.id] === o.val ? 'selected' : '';
                        return `
                            <div class="opt ${sel}" data-field="${step.id}" data-val="${o.val}" data-multi="false">
                                <div class="opt-icon">${o.icon}</div>
                                <div class="opt-text">
                                    <div class="opt-title">${o.title}</div>
                                    ${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                const nextVisible = visible[curIdx + 1] || null;
                const prevVisible = curIdx > 0 ? visible[curIdx - 1] : null;
                const isLast = !nextVisible;

                screen.innerHTML = `
                    <div class="step-label">Шаг ${curIdx + 1} из ${total}</div>
                    <div class="step-title">${label}</div>
                    <div class="options">${optsHtml}</div>
                    <div class="flex-row">
                        ${prevVisible ? `<button class="btn-back" id="btnBack">← Назад</button>` : ''}
                        ${isLast ? 
                            `<button class="btn-next" id="btnNext" ${!completed ? 'disabled' : ''}>Показать результат</button>` :
                            `<button class="btn-next" id="btnNext" ${!completed ? 'disabled' : ''}>Далее →</button>`
                        }
                    </div>
                `;

                // Назначение обработчиков на опции
                document.querySelectorAll('.opt').forEach(el => {
                    el.addEventListener('click', function(e) {
                        const field = this.dataset.field;
                        const val = this.dataset.val;
                        const multi = this.dataset.multi === 'true';
                        if (multi) {
                            toggleMulti(field, val);
                        } else {
                            selectSingle(field, val);
                        }
                    });
                });

                const backBtn = document.getElementById('btnBack');
                if (backBtn) backBtn.addEventListener('click', goBack);

                const nextBtn = document.getElementById('btnNext');
                if (nextBtn) {
                    nextBtn.addEventListener('click', function() {
                        if (this.disabled) return;
                        if (isLast) {
                            finish();
                        } else {
                            goForward();
                        }
                    });
                }

                screen.classList.remove('fade-in');
                void screen.offsetWidth;
                screen.classList.add('fade-in');
            }

            function renderResult() {
                const screen = document.getElementById('screen');
                const visible = getVisibleSteps();
                renderProgress(visible.length, visible.length);
                document.getElementById('breadcrumb').textContent = 'Результат';

                const scored = getScoredCameras();
                const top = scored.slice(0, 4);

                if (top.length === 0) {
                    screen.innerHTML = `
                        <div class="not-found fade-in">
                            <div class="emoji">🔍</div>
                            <h3>К сожалению, подходящих камер не найдено</h3>
                            <p>Попробуйте изменить параметры (бюджет, цели или жанры).</p>
                            <button class="btn-back" id="backToQuestions" style="font-size:15px;padding:0.7rem 2rem;">← Вернуться к вопросам</button>
                        </div>
                    `;
                    document.getElementById('backToQuestions').addEventListener('click', goBackToQuestions);
                    return;
                }

                // Итоговое сообщение
                const levelName = LEVEL_LABELS[state.level] || state.level;
                const budgetName = BUDGET_LABELS[state.budget] || state.budget;
                const goalList = (state.goals || []).map(g => GOAL_LABELS[g] || g).join(', ') || 'не указаны';
                const genreList = (state.genres || []).map(g => GENRE_LABELS[g] || g).join(', ') || 'не указаны';

                let summary = `Подобрано для <strong>${levelName}</strong>`;
                if (state.budget) summary += ` с <strong>${budgetName}</strong>`;
                if (state.system && state.system !== 'other') {
                    if (state.level === 'pro' && state.proIntent === 'replace') {
                        summary +=
                            `, который хочет сменить систему <strong>${state.system.toUpperCase()}</strong> на другую`;
                    } else {
                        summary += `, который уже имеет систему <strong>${state.system.toUpperCase()}</strong>`;
                    }
                }
                summary += `. Цели: <strong>${goalList}</strong>. Жанры: <strong>${genreList}</strong>.`;

                function getAvitoUrl(camName) {
                    const clean = camName.replace(/\s*\([^)]*\)/g, '').trim();
                    return `https://www.avito.ru/all?q=${encodeURIComponent(clean)}`;
                }

                function coverageHtml(cam) {
                    const userGoals = state.goals || [];
                    const userGenres = state.genres || [];
                    let parts = [];
                    if (userGoals.length) {
                        const covered = userGoals.filter(g => cam.goals && cam.goals.includes(g));
                        const missed = userGoals.filter(g => !cam.goals || !cam.goals.includes(g));
                        const coveredStr = covered.map(g => GOAL_LABELS[g] || g).join(', ');
                        const missedStr = missed.map(g => GOAL_LABELS[g] || g).join(', ');
                        if (coveredStr) parts.push(`✅ ${coveredStr}`);
                        if (missedStr) parts.push(`❌ ${missedStr}`);
                    }
                    if (userGenres.length) {
                        const covered = userGenres.filter(g => cam.genres && cam.genres.includes(g));
                        const missed = userGenres.filter(g => !cam.genres || !cam.genres.includes(g));
                        const coveredStr = covered.map(g => GENRE_LABELS[g] || g).join(', ');
                        const missedStr = missed.map(g => GENRE_LABELS[g] || g).join(', ');
                        if (coveredStr) parts.push(`🎯 ${coveredStr}`);
                        if (missedStr) parts.push(`⛔ ${missedStr}`);
                    }
                    return parts.length ? parts.join(' · ') : '—';
                }

                function cardHtml(cam, idx) {
                    const isPrimary = idx === 0;
                    const badgePrimary = isPrimary ?
                        `<span class="cam-badge badge-rec">Рекомендую</span>` :
                        `<span class="cam-badge badge-alt">Вариант ${idx + 1}</span>`;
                    const marketBadge = cam.badge ?
                        `<span class="cam-badge ${cam.badge}">${cam.badgeText || ''}</span>` :
                        '';
                    const checkpoints = cam.checkpoints ?
                        cam.checkpoints.map(cp => `<li>${cp}</li>`).join('') :
                        '';
                    const avitoUrl = getAvitoUrl(cam.name);
                    const coverage = coverageHtml(cam);

                    return `
                        <div class="cam-card ${isPrimary ? 'primary' : ''}">
                            <div class="card-category">${isPrimary ? 'Основная рекомендация' : 'Альтернатива'}</div>
                            <div class="cam-badge-wrap">${badgePrimary}${marketBadge}</div>
                            <div class="cam-img-wrap">📷 ${cam.name}</div>
                            <div class="cam-body">
                                <div class="cam-model">${cam.name}</div>
                                <div class="cam-price">${cam.price}</div>
                                ${checkpoints ? `<ul class="cam-checkpoints">${checkpoints}</ul>` : ''}
                                ${coverage ? `<div class="cam-coverage">${coverage}</div>` : ''}
                                ${cam.note ? `<div class="cam-note">${cam.note}</div>` : ''}
                                <a href="${avitoUrl}" target="_blank" class="avito-btn">Найти на Avito</a>
                            </div>
                        </div>
                    `;
                }

                screen.innerHTML = `
                    <div class="step-label">Результат</div>
                    <div class="step-title" style="font-size:17px;margin-bottom:0.5rem">Вот что я рекомендую</div>
                    <div class="result-summary">${summary}</div>
                    <div class="results-grid">
                        ${top.map((cam, i) => cardHtml(cam, i)).join('')}
                    </div>
                    <div class="buttons-row">
                        <button class="back-btn" id="backToQuestions">← Вернуться к вопросам</button>
                        <button class="reset-btn" id="resetAll">Начать заново</button>
                    </div>
                `;

                document.getElementById('backToQuestions').addEventListener('click', goBackToQuestions);
                document.getElementById('resetAll').addEventListener('click', resetAll);

                screen.classList.remove('fade-in');
                void screen.offsetWidth;
                screen.classList.add('fade-in');
            }

            // ─── СТАРТ ──────────────────────────────────────────────────
            // Загружаем камеры, после загрузки автоматически запустится renderStep()
            loadCameras();

        })(); // конец IIFE
    </script>
</body>
</html>
