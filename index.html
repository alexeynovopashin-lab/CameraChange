<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Подбор камеры</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #15171A;
    --ink-soft: #1C1F23;
    --surface: #2A2D31;
    --surface-raised: #313438;
    --border: #3A3D42;
    --border-soft: #2F3236;
    --paper: #F5F3EE;
    --paper-dim: #9A9690;
    --paper-faint: #6B6862;
    --signal: #E8470C;
    --signal-dim: #B83A0C;
    --signal-soft: rgba(232, 71, 12, 0.14);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --ease: cubic-bezier(.25,.8,.25,1);
  }

  body {
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px 60px;
    line-height: 1.5;
  }

  .shell { width: 100%; max-width: 600px; }

  .hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-mark {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -.01em;
  }
  .hdr-mark span { color: var(--signal); }
  .hdr-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-faint);
    letter-spacing: .02em;
  }

  .aperture-wrap {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 40px;
  }
  .aperture-svg { flex-shrink: 0; }
  .aperture-track { flex: 1; }
  .aperture-step-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--paper-faint, #6B6862);
    letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .aperture-bar {
    height: 1px;
    background: var(--border, #3A3D42);
    position: relative;
  }
  .aperture-bar-fill {
    position: absolute;
    top: 0; left: 0; height: 1px;
    background: var(--signal, #E8470C);
    transition: width .45s cubic-bezier(.25,.8,.25,1);
  }

  .q-block { animation: rise .4s var(--ease) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--signal);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .q-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    line-height: 1.22;
    letter-spacing: -.01em;
    margin-bottom: 8px;
    max-width: 480px;
  }
  .q-sub {
    font-size: 14px;
    color: var(--paper-dim);
    margin-bottom: 32px;
  }

  .opts { display: flex; flex-direction: column; }

  .opt {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 4px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    transition: padding-left .25s var(--ease);
    user-select: none;
  }
  .opt:first-child { border-top: 1px solid var(--border-soft); }
  .opt:hover { padding-left: 10px; }

  .opt-index {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper-faint);
    width: 20px;
    flex-shrink: 0;
    transition: color .2s;
  }
  .opt.selected .opt-index { color: var(--signal); }

  .opt-body { flex: 1; min-width: 0; }
  .opt-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--paper);
    transition: color .2s;
  }
  .opt-hint {
    font-size: 13px;
    color: var(--paper-faint);
    margin-top: 2px;
  }

  .opt-mark {
    width: 16px; height: 16px;
    border: 1px solid var(--paper-faint);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: border-color .2s;
  }
  .opt.selected .opt-mark { border-color: var(--signal); }
  .opt.selected .opt-mark::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--signal);
  }
  .opt-mark.square { border-radius: 3px; }
  .opt-mark.square::after { border-radius: 1px; }

  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
  }
  .btn-text {
    background: none;
    border: none;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--paper-faint);
    cursor: pointer;
    padding: 8px 0;
    transition: color .2s;
  }
  .btn-text:hover:not(:disabled) { color: var(--paper); }
  .btn-text:disabled { opacity: .25; cursor: default; }

  .btn-shutter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--paper);
    color: var(--ink);
    border: none;
    border-radius: 2px;
    padding: 13px 26px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .btn-shutter:hover:not(:disabled) { background: #fff; transform: translateX(2px); }
  .btn-shutter:disabled { opacity: .25; cursor: default; transform: none; }
  .btn-shutter svg { transition: transform .2s; }
  .btn-shutter:hover svg { transform: translateX(3px); }

  .r-head { margin-bottom: 32px; }
  .r-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--signal);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .r-title {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .r-sub { font-size: 14px; color: var(--paper-dim); }

  .cam-list { display: flex; flex-direction: column; gap: 1px; }

  .cam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    transition: background .2s;
  }
  .cam-card + .cam-card { margin-top: 14px; }
  .cam-card.top { border-color: var(--signal-dim); background: var(--surface-raised); }

  .cam-header {
    display: grid;
    grid-template-columns: 120px 1fr 72px;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .cam-img-wrap {
    background: #1a1c1f;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 90px;
  }
  .cam-img-wrap img {
    max-width: 100%;
    max-height: 70px;
    object-fit: contain;
    display: block;
  }
  .cam-img-placeholder {
    width: 48px;
    height: 48px;
    opacity: .15;
  }
  .cam-header-mid {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    min-width: 0;
  }
  .cam-name {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cam-price {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--signal);
  }
  .cam-tagrow {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cam-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .03em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid var(--border);
    color: var(--paper-faint);
  }
  .cam-tag.pick {
    border-color: var(--signal-dim);
    color: var(--signal);
    background: var(--signal-soft);
  }
  .cam-score-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 10px;
    border-left: 1px solid var(--border-soft);
  }
  .score-ring { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .score-ring-fill {
    fill: none;
    stroke: var(--paper-faint);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s var(--ease);
  }
  .cam-card.top .score-ring-fill { stroke: var(--signal); }
  .score-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-dim);
  }
  .cam-card.top .score-num { color: var(--signal); }

  .cam-body {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cam-specs {
    display: flex;
    gap: 0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--paper-faint);
    flex-wrap: wrap;
  }
  .cam-specs .spec + .spec::before {
    content: '·';
    margin: 0 7px;
    opacity: .4;
  }
  .cam-note {
    font-size: 13px;
    color: var(--paper-dim);
    line-height: 1.55;
  }

  .cam-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
    flex-wrap: wrap;
  }
  .avito-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    background: var(--paper);
    padding: 8px 14px;
    text-decoration: none;
    border-radius: 2px;
    transition: background .2s;
  }
  .avito-link:hover { background: #fff; }
  .fb-group { display: flex; align-items: center; gap: 8px; }
  .fb-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--paper-faint);
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .fb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--paper-faint);
    width: 30px; height: 30px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .2s, color .2s;
  }
  .fb-btn:hover { border-color: var(--paper-dim); color: var(--paper); }
  .fb-btn.active.up { border-color: #4D8C5C; color: #4D8C5C; }
  .fb-btn.active.down { border-color: var(--signal); color: var(--signal); }
  .fb-btn.dimmed { opacity: .3; pointer-events: none; }

  @media (max-width: 480px) {
    .cam-header { grid-template-columns: 90px 1fr 60px; }
    .cam-img-wrap { min-height: 70px; }
    .cam-name { font-size: 15px; }
  }

  .r-foot {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .link-btn {
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--paper-faint);
    letter-spacing: .02em;
    cursor: pointer;
    transition: color .2s;
  }
  .link-btn:hover { color: var(--paper); }

  .not-found { text-align: center; padding: 60px 20px; }
  .not-found .nf-mark { font-family: var(--font-display); font-size: 40px; color: var(--border); margin-bottom: 20px; }
  .not-found h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; margin-bottom: 10px; }
  .not-found p { color: var(--paper-dim); font-size: 14px; max-width: 360px; margin: 0 auto 24px; }
</style>
</head>

// ============================================================
// 4. ДИАФРАГМЕННОЕ КОЛЬЦО (8 лепестков, серповидные)
// ============================================================
function apertureSVG(openness) {
  const blades = 10;
  const cx = 50, cy = 50;
  const pivotY = 7;
  const maxOpen = 58; // deg, closed at 0 -> open at openness=1
  const openAngle = openness * maxOpen;
  const bladeD = 'M 3.667 -1.048 C -3.667 -3.405, -17.599 -2.357, -24.934 2.357 C -30.433 6.024, -28.601 10.476, -21.266 13.619 C -7.333 20.429, 4.4 34.048, 1.467 49.238 C -0.367 52.905, 4.4 52.905, 6.6 48.976 C 11.0 36.667, 9.534 14.405, 3.667 -1.048 Z';

  let groups = '';
  for (let i = 0; i < blades; i++) {
    const fanAngle = (360 / blades) * i;
    const fill = i % 2 === 0 ? 'var(--surface, #2A2D31)' : 'var(--surface-raised, #313438)';
    groups += `
      <g transform="rotate(${fanAngle} ${cx} ${cy})">
        <g transform="rotate(${openAngle} ${cx} ${pivotY})">
          <use href="#apBlade" transform="translate(${cx} ${pivotY})" fill="${fill}" stroke="var(--border-soft, #2F3236)" stroke-width="0.4"/>
          <circle cx="${cx}" cy="${pivotY}" r="1.1" fill="var(--border, #3A3D42)"/>
        </g>
      </g>`;
  }

  return `<svg class="aperture-svg" width="76" height="76" viewBox="0 0 100 100">
    <defs>
      <clipPath id="apClip"><circle cx="${cx}" cy="${cy}" r="40"/></clipPath>
      <path id="apBlade" d="${bladeD}"/>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="48" fill="var(--ink-soft, #1C1F23)"/>
    <circle cx="${cx}" cy="${cy}" r="40" fill="var(--ink, #15171A)"/>
    <g clip-path="url(#apClip)">${groups}</g>
    <circle cx="${cx}" cy="${cy}" r="40" fill="none" stroke="var(--border, #3A3D42)" stroke-width="1"/>
  </svg>`;
}
function renderAperture(stepIdx, total) {
  const fStops = [32, 22, 16, 11, 8, 5.6, 4, 2.8, 2, 1.4, 1.2, 1.0];
  const maxIndex = fStops.length - 1;

  let progress;
  let openness;

  if (total <= 1) {
    if (stepIdx === 0) {
      progress = 0;
      openness = 0.38; // приоткрыта на экране выбора уровня
    } else {
      progress = 1;
      openness = 1.85; // полностью открыта на результатах
    }
  } else {
    // Прогресс от 0 до 1: первый вопрос → 1/total, последний → 1
    progress = stepIdx / total;

    // ── НАСТРОЙКА СКОРОСТИ ОТКРЫТИЯ ──
    // Старт с 0.38, финиш 1.0
    openness = 0.38 + 0.75 * progress;
  }

  progress = Math.min(Math.max(progress, 0), 1);
  openness = Math.min(Math.max(openness, 0), 1.85);

  const idx = Math.round(progress * maxIndex);
  const fNumber = fStops[idx] !== undefined ? fStops[idx] : fStops[maxIndex];
  const displayF = Number.isInteger(fNumber) ? fNumber : fNumber.toFixed(1);

  const wrap = document.getElementById('apertureWrap');
  if (!wrap) return;

  const displayStep = Math.min(stepIdx, total);

  let label;
  if (stepIdx === total && total === 1) {
    label = `f/${displayF} · диафрагма открыта полностью`;
  } else {
    label = `f/${displayF} · шаг ${displayStep} из ${total}`;
  }

  wrap.innerHTML = `
    ${apertureSVG(openness)}
    <div class="aperture-track">
      <div class="aperture-step-label">${label}</div>
      <div class="aperture-bar"><div class="aperture-bar-fill" style="width:${(stepIdx / total) * 100}%"></div></div>
    </div>`;
}

// 6. ЛОГИКА ОПРОСНИКА
// ============================================================
function initBranch() {
  const level = state.level;
  if (level === 'beginner') {
    state.questions = questionTree.beginner.slice();
    state.totalSteps = state.questions.length;
  } else if (level === 'enthusiast') {
    state.questions = questionTree.enthusiast.tt.slice(0, 4);
    state.totalSteps = state.questions.length;
  } else if (level === 'pro') {
    state.questions = questionTree.pro.slice();
    state.totalSteps = state.questions.length;
  } else if (level === 'blogger') {
    state.questions = questionTree.blogger.slice();
    state.totalSteps = state.questions.length;
  }
  renderAperture(0, state.totalSteps);
}

function render() {
  if (state.finished) { showResults(); return; }
  if (!state.level) { renderLevelSelection(); return; }
  if (!state.questions || state.questions.length === 0) {
    initBranch();
    if (state.questions.length === 0) { screen.innerHTML = '<p>Ошибка: вопросы не найдены</p>'; return; }
  }
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentStep];
  if (!q) { state.finished = true; render(); return; }

  const isMulti = q.multiple || false;
  const selected = state.answers[q.id] || (isMulti ? [] : null);

  const stepNumber = state.currentStep + 1;
  const total = state.totalSteps;

  const optionsHtml = q.options.map((opt, i) => {
    const num = String(i+1).padStart(2, '0');
    const checked = isMulti ? (selected.includes(opt.value) ? 'checked' : '') : (selected === opt.value ? 'checked' : '');
    const inputType = isMulti ? 'checkbox' : 'radio';
    const name = isMulti ? `${q.id}[]` : q.id;
    return `
      <div class="opt" data-value="${opt.value}">
        <span class="opt-index">${num}</span>
        <div class="opt-body">
          <div class="opt-title">${opt.label}</div>
          ${opt.hint ? `<div class="opt-hint">${opt.hint}</div>` : ''}
        </div>
        <input type="${inputType}" name="${name}" value="${opt.value}" ${checked} style="display:none;" />
        <div class="opt-mark ${isMulti ? 'square' : ''}"></div>
      </div>
    `;
  }).join('');

  const eyebrow = `ПАРАМЕТР ${String(stepNumber).padStart(2, '0')}`;

  screen.innerHTML = `
    <div class="q-block">
      <div class="q-eyebrow">${eyebrow}</div>
      <div class="q-title">${q.text}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="opts" data-qid="${q.id}" data-multiple="${isMulti}">${optionsHtml}</div>
      <div class="actions">
        <button class="btn-text" id="prevBtn" ${state.currentStep === 0 ? 'disabled' : ''}>← назад</button>
        <span></span>
        <button class="btn-shutter" id="nextBtn" disabled>${state.currentStep === state.totalSteps - 1 ? 'Показать камеры' : 'Далее'}</button>
      </div>
    </div>
  `;

  function updateSelectedClasses() {
    const container = document.querySelector('.opts');
    if (!container) return;
    container.querySelectorAll('.opt').forEach(opt => {
      const inp = opt.querySelector('input');
      if (inp) {
        if (inp.checked) opt.classList.add('selected');
        else opt.classList.remove('selected');
      }
    });
  }

  const inputs = screen.querySelectorAll('.opt input');
  inputs.forEach(inp => {
    inp.addEventListener('change', (e) => {
      const qid = e.target.closest('.opts').dataset.qid;
      const multiple = e.target.closest('.opts').dataset.multiple === 'true';
      if (multiple) {
        const checked = screen.querySelectorAll(`.opts input[name="${qid}[]"]:checked`);
        state.answers[qid] = Array.from(checked).map(c => c.value);
      } else {
        if (e.target.checked) state.answers[qid] = e.target.value;
      }
      updateSelectedClasses();
      updateNextButtonState();

      if (qid === 'e1') {
        const val = state.answers['e1'];
        if (val === 'tt') state.questions = questionTree.enthusiast.tt.slice();
        else if (val === 'creative') state.questions = questionTree.enthusiast.creative.slice();
        state.totalSteps = state.questions.length;
        state.currentStep = 1;
        render();
        return;
      }
    });
  });

  screen.querySelectorAll('.opt').forEach(el => {
    const inp = el.querySelector('input');
    el.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (inp) {
        if (inp.type === 'checkbox') {
          inp.checked = !inp.checked;
        } else {
          const name = inp.name;
          screen.querySelectorAll(`input[name="${name}"]`).forEach(r => r.checked = false);
          inp.checked = true;
        }
        inp.dispatchEvent(new Event('change'));
      }
    });
    if (inp && inp.checked) el.classList.add('selected');
    else el.classList.remove('selected');
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (state.level === 'enthusiast' && state.currentStep === 0) {
      state.level = null;
      state.currentStep = 0;
      state.questions = [];
      state.totalSteps = 0;
      render();
      return;
    }
    if (state.currentStep > 0) {
      state.currentStep--;
      render();
    }
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    const qid = state.questions[state.currentStep].id;
    const answer = state.answers[qid];
    if (!answer || (Array.isArray(answer) && answer.length === 0)) {
      alert('Пожалуйста, выберите вариант ответа');
      return;
    }
    if (state.currentStep === state.totalSteps - 1) {
      state.finished = true;
      render();
      return;
    }
    state.currentStep++;
    render();
  });

  updateNextButtonState();
  renderAperture(state.currentStep + 1, state.totalSteps);
  hdrMeta.textContent = `id · ${String(stepNumber).padStart(2,'0')}/${total}`;
}

function updateNextButtonState() {
  const q = state.questions[state.currentStep];
  if (!q) return;
  const answer = state.answers[q.id];
  const hasAnswer = answer && (Array.isArray(answer) ? answer.length > 0 : true);
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.disabled = !hasAnswer;
}

    if (b === 'budget_3') return 60000;

    if (b === 'budget_5') return Infinity;
  } else if (level === 'enthusiast') {
    const b = answers['e2'];
    if (b === 'budget_1') return 30000;
    if (b === 'budget_2') return 60000;
    if (b === 'budget_3') return 100000;
    if (b === 'budget_4') return 200000;
    if (b === 'budget_5') return Infinity;
  } else if (level === 'pro') {
    const b = answers['p2'];
    if (b === 'budget_1') return 100000;
    if (b === 'budget_2') return 200000;
    if (b === 'budget_3') return 400000;
    if (b === 'budget_4') return Infinity;
  } else if (level === 'blogger') {
    const b = answers['bl1'];
    if (b === 'budget_1') return 30000;
    if (b === 'budget_2') return 60000;
    if (b === 'budget_3') return 100000;
    if (b === 'budget_4') return 200000;
    if (b === 'budget_5') return Infinity;
  }
  return Infinity;
}

function getWeightsBeginner() {
  return {
    priceRange: (cam) => {
      const price = cam.price;
      const budget = state.answers['b1'];
      if (budget === 'budget_1') return price <= 20000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 35000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 60000 ? 1 : 0;
      if (budget === 'budget_4') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_5') return price > 100000 ? 1 : 0;
      return 0.5;
    },
    simpleMenu: (cam) => cam.menuComplexity === 'simple' ? 1 : 0,
    compact: (cam) => { const needCompact = state.answers['b4'] === 'compact_important'; return needCompact ? (cam.compact || cam.mirrorless ? 1 : 0) : 0.5; },
    beginnerFriendly: (cam) => cam.forBeginners ? 1 : 0,
    canonBonus: (cam) => cam.brand === 'Canon' ? 0.2 : 0,
  };
}

function getWeightsEnthusiast() {
  const path = state.answers['e1'] || 'tt';
  const base = {
    priceRange: (cam) => {
      const price = cam.price;
      const budget = state.answers['e2'];
      if (budget === 'budget_1') return price <= 30000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 60000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_4') return price <= 200000 ? 1 : 0;
      if (budget === 'budget_5') return price > 200000 ? 1 : 0;
      return 0.5;
    },
  };
  if (path === 'tt') {
    return {
      ...base,
      highRes: (cam) => {
        const need = state.answers['e5_tt'];
        if (need === 'high_mp') return cam.resolution >= 30 ? 1 : 0;
        if (need === 'mid_mp') return cam.resolution >= 20 && cam.resolution < 30 ? 1 : 0;
        return 0.5;
      },
      burst: (cam) => {
        const need = state.answers['e6_tt'];
        return need === 'fast_burst' ? (cam.cardSlots >= 2 ? 1 : 0) : 0.5;
      },
      af: (cam) => {
        const need = state.answers['e7_tt'];
        return need === 'af_critical' ? (cam.eyeAutofocus === true ? 1 : 0) : 0.5;
      }
    };
  } else {
    return {
      ...base,
      color: (cam) => {
        const need = state.answers['e5_creative'];
        return need === 'color_important' ? (cam.colorScience ? 1 : 0) : 0.5;
      },
      menuSimple: (cam) => {
        const need = state.answers['e6_creative'];
        return need === 'menu_simple' ? (cam.menuComplexity === 'simple' ? 1 : 0) : 0.5;
      },
      ergo: (cam) => {
        const need = state.answers['e7_creative'];
        return need === 'ergo_important' ? (cam.weight < 600 ? 1 : 0) : 0.5;
      }
    };
  }
}

function getWeightsPro() {
  return {
    sensor: (cam) => {
      const need = state.answers['p1'];
      if (need === 'crop') return cam.crop ? 1 : 0;
      if (need === 'fullframe') return cam.fullFrame ? 1 : 0;
      if (need === 'medium') return cam.mediumFormat ? 1 : 0;
      return 0.5;
    },
    priceRange: (cam) => {
      const price = cam.price;
      const budget = state.answers['p2'];
      if (budget === 'budget_1') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 200000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 400000 ? 1 : 0;
      if (budget === 'budget_4') return price > 400000 ? 1 : 0;
      return 0.5;
    },
    weight: (cam) => {
      const need = state.answers['p3'];
      if (need === 'weight_critical') return cam.weight < 700 ? 1 : 0;
      if (need === 'weight_moderate') return cam.weight < 1000 ? 1 : 0;
      return 0.5;
    },
    eyeAf: (cam) => {
      const need = state.answers['p4'];
      if (need === 'yes') return cam.eyeAutofocus === true ? 1 : 0;
      if (need === 'not_use') return 0.5;
      return 0;
    },
    log: (cam) => {
      const need = state.answers['p5'];
      if (need === 'yes') return cam.logProfile ? 1 : 0;
      if (need === 'no_video') return 0.5;
      return 0;
    },
    bitDepth: (cam) => {
      const need = state.answers['p6'];
      if (need === '12bit') return cam.bitDepth >= 12 ? 1 : 0;
      if (need === '14bit') return cam.bitDepth >= 14 ? 1 : 0;
      return 0.5;
    },
    replaceOrSecond: (cam) => {
      const choice = state.answers['p7'];
      const currentSystem = state.answers['p8'];
      const lensPark = state.answers['p9'];
      let systemBonus = 0;
      if (choice === 'second') {
        if (cam.brand === currentSystem) systemBonus = 0.3;
      } else {
        if (cam.brand !== currentSystem) {
          systemBonus = 0.2;
          if (cam.brand === 'Sony') systemBonus += 0.1;
        }
      }
      let lensBonus = 0;
      if (lensPark === 'third_party' && cam.brand === 'Sony') lensBonus = 0.3;
      else if (lensPark === 'mixed' && cam.brand === 'Sony') lensBonus = 0.15;
      const extras = state.answers['p10'] || [];
      let extraBonus = 0;
      if (extras.includes('two_slots') && cam.cardSlots >= 2) extraBonus += 0.1;
      if (extras.includes('eye_af_video') && cam.eyeAutofocus === true) extraBonus += 0.1;
      if (extras.includes('log_video') && cam.logProfile) extraBonus += 0.1;
      if (extras.includes('weather') && cam.weatherSealing) extraBonus += 0.1;
      if (extras.includes('ibis') && cam.imageStabilization) extraBonus += 0.1;
      return systemBonus + lensBonus + extraBonus;
    }
  };
}

function getWeightsBlogger() {
  return {
    priceRange: (cam) => {
      const price = cam.price;
      const budget = state.answers['bl1'];
      if (budget === 'budget_1') return price <= 30000 ? 1 : 0;
      if (budget === 'budget_2') return price <= 60000 ? 1 : 0;
      if (budget === 'budget_3') return price <= 100000 ? 1 : 0;
      if (budget === 'budget_4') return price <= 200000 ? 1 : 0;
      if (budget === 'budget_5') return price > 200000 ? 1 : 0;
      return 0.5;
    },
    platform: (cam) => {
      const platform = state.answers['bl2'];
      if (platform === 'youtube') {
        let s=0;
        if (cam.video && cam.video.includes('4K')) s+=0.5;
        if (cam.imageStabilization) s+=0.3;
        if (cam.microphoneInput) s+=0.2;
        return s;
      } else if (platform === 'shorts') {
        let s=0;
        if (cam.compact || cam.mirrorless) s+=0.4;
        if (cam.rotatingScreen) s+=0.3;
        if (cam.autofocus) s+=0.3;
        return s;
      } else if (platform === 'streams') {
        let s=0;
        if (cam.video) s+=0.3;
        if (cam.microphoneInput) s+=0.3;
        if (cam.imageStabilization) s+=0.2;
        if (cam.autofocus) s+=0.2;
        return s;
      }
      return 0.5;
    },
    ibis: (cam) => {
      const need = state.answers['bl3'];
      if (need === 'ibis_critical') return cam.imageStabilization ? 1 : 0;
      if (need === 'gimbal') return 0.5;
      return 0.5;
    },
    mic: (cam) => {
      const need = state.answers['bl4'];
      return need === 'yes' ? (cam.microphoneInput ? 1 : 0) : 0.5;
    },
    flipScreen: (cam) => {
      const need = state.answers['bl5'];
      if (need === 'critical') return cam.rotatingScreen ? 1 : 0;
      if (need === 'desirable') return cam.rotatingScreen ? 0.5 : 0;
      return 0.5;
    },
    afVideo: (cam) => {
      const need = state.answers['bl6'];
      return need === 'critical' ? (cam.autofocus ? 1 : 0) : 0.5;
    },
    menuComplexity: (cam) => {
      const need = state.answers['bl7'];
      return need === 'simple' ? (cam.menuComplexity === 'simple' ? 1 : 0) : 0.5;
    },
    weightCompact: (cam) => {
      const need = state.answers['bl8'];
      if (need === 'critical') return (cam.compact || cam.mirrorless) && cam.weight < 600 ? 1 : 0;
      if (need === 'moderate') return cam.weight < 800 ? 1 : 0;
      return 0.5;
    }
  };
}

// ============================================================
// 8. РАСЧЁТ РЕЗУЛЬТАТОВ
// ============================================================
function computeScores() {
  const level = state.level;
  if (!level || !cameras.length) return [];

  const budgetLimit = getBudgetLimit(level, state.answers);
  const filteredCameras = cameras.filter(cam => cam.price <= budgetLimit);
  if (!filteredCameras.length) return [];

  let weightsFn;
  if (level === 'beginner') weightsFn = getWeightsBeginner;
  else if (level === 'enthusiast') weightsFn = getWeightsEnthusiast;
  else if (level === 'pro') weightsFn = getWeightsPro;
  else if (level === 'blogger') weightsFn = getWeightsBlogger;
  else return [];

  const weights = weightsFn();
  const keys = Object.keys(weights).filter(k => typeof weights[k] === 'function');
  const count = keys.length || 1;

  const scored = filteredCameras.map(cam => {
    let sum = 0;
    keys.forEach(key => { sum += weights[key](cam); });
    const normalized = Math.min(1, sum / count);
    return { ...cam, score: normalized };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 6);
}

function ringSVG(score, isTop) {
  const r = 24, circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - score / 100);
  return `<svg class="score-ring" width="64" height="64" viewBox="0 0 64 64">
    <circle class="score-ring-bg" cx="32" cy="32" r="${r}"/>
    <circle class="score-ring-fill" cx="32" cy="32" r="${r}"
      stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
      data-final-offset="${offset}"/>
  </svg>`;
}

// ============================================================
// 9. ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ
// ============================================================
function showResults() {
  hdrMeta.textContent = 'результат';
  renderAperture(1, 1);

  const results = computeScores();
  if (!results.length) {
    screen.innerHTML = `
      <div class="not-found">
        <div class="nf-mark">∅</div>
        <h3>Ничего не нашли</h3>
        <p>По вашим критериям не нашлось подходящих камер. Попробуйте изменить бюджет или убрать ограничения по системе.</p>
        <button class="btn-shutter" id="btnReset">Начать заново</button>
      </div>`;
    document.getElementById('btnReset').addEventListener('click', reset);
    return;
  }

  const lvlMap = { beginner: 'новичок', enthusiast: 'любитель', pro: 'профессионал', blogger: 'блогер' };
  const levelLabel = lvlMap[state.level] || '';
  let budgetLabel = '';
  const budgetKey = {
    beginner: 'b1',
    enthusiast: 'e2',
    pro: 'p2',
    blogger: 'bl1'
  }[state.level];
  const budgetValue = state.answers[budgetKey];
  if (budgetValue) {
    const budgetMap = {
      'budget_1': 'до 20 000 ₽',
      'budget_2': '20 000 – 35 000 ₽',
      'budget_3': '35 000 – 60 000 ₽',
      'budget_4': '60 000 – 100 000 ₽',
      'budget_5': 'больше 100 000 ₽'
    };
    if (state.level === 'enthusiast' || state.level === 'blogger') {
      budgetMap['budget_1'] = 'до 30 000 ₽';
      budgetMap['budget_2'] = '30 000 – 60 000 ₽';
      budgetMap['budget_3'] = '60 000 – 100 000 ₽';
      budgetMap['budget_4'] = '100 000 – 200 000 ₽';
      budgetMap['budget_5'] = 'больше 200 000 ₽';
    } else if (state.level === 'pro') {
      budgetMap['budget_1'] = 'до 100 000 ₽';
      budgetMap['budget_2'] = '100 000 – 200 000 ₽';
      budgetMap['budget_3'] = '200 000 – 400 000 ₽';
      budgetMap['budget_4'] = 'больше 400 000 ₽';
    }
    budgetLabel = budgetMap[budgetValue] || '';
  }
  const summary = [levelLabel, budgetLabel].filter(Boolean).join(' · ');

  const cardsHtml = results.map((cam, i) => {
    const isTop = i === 0;
    const pct = Math.round(cam.score * 100);

    const typeMap = { Mirrorless: 'беззеркальная', DSLR: 'зеркальная', Compact: 'компакт', Smartphone: 'смартфон' };
    const tag = typeMap[cam.type] || cam.tag || '';

    const specs = [];
    if (cam.sensorSize) specs.push(cam.sensorSize);
    if (cam.resolution) specs.push(cam.resolution + ' Мп');
    if (cam.video) specs.push(cam.video);
    if (cam.weight) specs.push(cam.weight + ' г');
    if (cam.imageStabilization) specs.push('IBIS');
    if (cam.weatherSealing) specs.push('влагозащита');
    if (cam.twoCardSlots) specs.push('2 слота');

    const specsHtml = specs.map(s => `<span class="spec">${s}</span>`).join('');
    const avitoUrl = `https://www.avito.ru/all?q=${encodeURIComponent(cam.avitoQuery || cam.brand + ' ' + cam.model)}`;
    const voted = state.voted[cam.id];
    const formattedPrice = cam.price ? cam.price.toLocaleString('ru-RU') + ' ₽' : '';

    const imgContent = cam.image
      ? `<img src="${cam.image}" alt="${cam.brand} ${cam.model}" onerror="this.style.display='none'">`
      : `<svg class="cam-img-placeholder" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="10" width="40" height="28" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="3" stroke="currentColor" stroke-width="1.5"/>
          <rect x="16" y="10" width="8" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/>
        </svg>`;

    return `
      <div class="cam-card${isTop ? ' top' : ''}">
        <div class="cam-header">
          <div class="cam-img-wrap">${imgContent}</div>
          <div class="cam-header-mid">
            <div class="cam-name">${cam.brand} ${cam.model}</div>
            <div class="cam-price">${formattedPrice}</div>
            <div class="cam-tagrow">
              ${tag ? `<span class="cam-tag">${tag}</span>` : ''}
              ${isTop ? '<span class="cam-tag pick">рекомендуем</span>' : ''}
            </div>
          </div>
          <div class="cam-score-wrap">
            ${ringSVG(pct, isTop)}
            <span class="score-num">${pct}%</span>
          </div>
        </div>
        <div class="cam-body">
          <div class="cam-specs">${specsHtml}</div>
          <div class="cam-note">${cam.note || ''}</div>
          <div class="cam-foot">
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <a class="avito-link" href="${avitoUrl}" target="_blank" rel="noopener">найти на авито</a>
          <a href="/camerateka.html?camera=${cameras.indexOf(cam)}" class="avito-link" style="background:var(--surface); border:1px solid var(--border); color:var(--paper-dim); padding:9px 16px;">в каталоге</a>
         </div>
          <div class="fb-group">
    <span class="fb-label">подходит?</span>
    <button class="fb-btn up${voted === 1 ? ' active' : ''}${voted !== undefined ? ' dimmed' : ''}" data-id="${cam.id}" data-vote="1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M7 11v10H4a1 1 0 01-1-1v-8a1 1 0 011-1h3zm0 0l5-9a2.5 2.5 0 015 1v4h5.5a2 2 0 011.94 2.49l-1.5 6A2 2 0 0118.04 21H9a2 2 0 01-2-2v-8z" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <button class="fb-btn down${voted === -1 ? ' active' : ''}${voted !== undefined ? ' dimmed' : ''}" data-id="${cam.id}" data-vote="-1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="transform:rotate(180deg)"><path d="M7 11v10H4a1 1 0 01-1-1v-8a1 1 0 011-1h3zm0 0l5-9a2.5 2.5 0 015 1v4h5.5a2 2 0 011.94 2.49l-1.5 6A2 2 0 0118.04 21H9a2 2 0 01-2-2v-8z" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </div>
</div>
          </div>
        </div>
      </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="r-head">
      <div class="r-eyebrow">выдержка зафиксирована</div>
      <div class="r-title">Топ-4 камеры для вас</div>
      <div class="r-sub">${summary}</div>
    </div>
    <div class="cam-list">${cardsHtml}</div>
    <div class="r-foot">
      <button class="link-btn" id="btnBack">изменить ответы</button>
      <button class="link-btn" id="btnReset">начать заново</button>
    </div>
  `;

  requestAnimationFrame(() => {
    document.querySelectorAll('.score-ring-fill').forEach(el => {
      el.style.strokeDashoffset = el.dataset.finalOffset;
    });
  });

  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('btnBack').addEventListener('click', () => {
    state.finished = false;
    state.currentStep = state.totalSteps - 1;
    render();
  });

  screen.querySelectorAll('.fb-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const vote = Number(btn.dataset.vote);
      if (state.voted[id] !== undefined) return;
      state.voted[id] = vote;
      saveFeedback(id, vote, state.answers);
      showResults();
    });
  });
}

function saveFeedback(cameraId, vote, answers) {
  try {
    const key = 'cam_feedback';
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push({ cameraId, vote, answers: { level: answers.level, budget: answers.budget, goals: answers.goals }, date: new Date().toISOString() });
    localStorage.setItem(key, JSON.stringify(existing));
  } catch(e) {}
}

function reset() {
  Object.assign(state, { level: null, path: null, answers: {}, currentStep: 0, totalSteps: 0, questions: [], finished: false, voted: {} });
  render();
}

// ============================================================
// 10. ЗАПУСК
// ============================================================
loadCameras().then(() => { render(); });
</script>
